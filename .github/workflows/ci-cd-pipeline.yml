name: Cancer Genomics CI/CD Pipeline

on:
  push:
    branches: [ main, develop, staging ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Security and Quality Checks
  security-scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r CancerGenomicsSuite/ -f json -o bandit-report.json || true

      - name: Run Safety check
        run: |
          pip install safety
          safety check --json --output safety-report.json || true

  # Code Quality and Testing
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_genomics_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r CancerGenomicsSuite/requirements.txt
          pip install pytest pytest-cov pytest-xdist flake8 black isort

      - name: Lint with flake8
        run: |
          flake8 CancerGenomicsSuite/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 CancerGenomicsSuite/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code formatting with black
        run: |
          black --check CancerGenomicsSuite/

      - name: Check import sorting with isort
        run: |
          isort --check-only CancerGenomicsSuite/

      - name: Run tests with pytest
        run: |
          cd CancerGenomicsSuite
          pytest CancerGenomicsSuite/tests/ -v --cov=CancerGenomicsSuite --cov-report=xml --cov-report=html --junitxml=pytest-report.xml
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_genomics_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./CancerGenomicsSuite/coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            CancerGenomicsSuite/pytest-report.xml
            CancerGenomicsSuite/htmlcov/

  # Build and Push Docker Images
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [security-scan, test]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    
    strategy:
      matrix:
        environment: [dev, staging, prod]
        include:
          - environment: dev
            tag: latest
            condition: github.ref == 'refs/heads/develop'
          - environment: staging
            tag: staging
            condition: github.ref == 'refs/heads/staging'
          - environment: prod
            tag: ${{ github.ref_name }}
            condition: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ matrix.tag }},enable={{ matrix.condition }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./CancerGenomicsSuite
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ matrix.tag }}

  # Deploy to Development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop'
    environment: development
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ secrets.AWS_REGION_DEV }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION_DEV }} --name ${{ secrets.EKS_CLUSTER_NAME_DEV }}

      - name: Deploy to development
        run: |
          helm upgrade --install cancer-genomics-dev \
            ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite \
            --namespace cancer-genomics-dev \
            --create-namespace \
            --set global.cloudProvider=aws \
            --set global.region=${{ secrets.AWS_REGION_DEV }} \
            --set global.aws.eksClusterName=${{ secrets.EKS_CLUSTER_NAME_DEV }} \
            --set image.tag=latest \
            --set global.domain=${{ secrets.DEV_DOMAIN }} \
            --set global.apiDomain=${{ secrets.DEV_API_DOMAIN }} \
            --values ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite/values-dev.yaml \
            --wait --timeout=10m

      - name: Run smoke tests
        run: |
          kubectl wait --for=condition=ready pod -l app=cancer-genomics-web -n cancer-genomics-dev --timeout=300s
          kubectl get pods -n cancer-genomics-dev

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/staging'
    environment: staging
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}
          aws-region: ${{ secrets.AWS_REGION_STAGING }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION_STAGING }} --name ${{ secrets.EKS_CLUSTER_NAME_STAGING }}

      - name: Deploy to staging
        run: |
          helm upgrade --install cancer-genomics-staging \
            ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite \
            --namespace cancer-genomics-staging \
            --create-namespace \
            --set global.cloudProvider=aws \
            --set global.region=${{ secrets.AWS_REGION_STAGING }} \
            --set global.aws.eksClusterName=${{ secrets.EKS_CLUSTER_NAME_STAGING }} \
            --set image.tag=staging \
            --set global.domain=${{ secrets.STAGING_DOMAIN }} \
            --set global.apiDomain=${{ secrets.STAGING_API_DOMAIN }} \
            --values ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite/values-staging.yaml \
            --wait --timeout=15m

      - name: Run integration tests
        run: |
          kubectl wait --for=condition=ready pod -l app=cancer-genomics-web -n cancer-genomics-staging --timeout=300s
          # Add integration test commands here
          kubectl get pods -n cancer-genomics-staging

  # Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ secrets.AWS_REGION_PROD }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION_PROD }} --name ${{ secrets.EKS_CLUSTER_NAME_PROD }}

      - name: Deploy to production
        run: |
          helm upgrade --install cancer-genomics-prod \
            ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite \
            --namespace cancer-genomics-prod \
            --create-namespace \
            --set global.cloudProvider=aws \
            --set global.region=${{ secrets.AWS_REGION_PROD }} \
            --set global.aws.eksClusterName=${{ secrets.EKS_CLUSTER_NAME_PROD }} \
            --set image.tag=${{ github.ref_name }} \
            --set global.domain=${{ secrets.PROD_DOMAIN }} \
            --set global.apiDomain=${{ secrets.PROD_API_DOMAIN }} \
            --values ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite/values-prod.yaml \
            --wait --timeout=20m

      - name: Run production health checks
        run: |
          kubectl wait --for=condition=ready pod -l app=cancer-genomics-web -n cancer-genomics-prod --timeout=300s
          # Add production health check commands here
          kubectl get pods -n cancer-genomics-prod

      - name: Notify deployment success
        uses: 8398a7/action-slack@v3
        if: success()
        with:
          status: success
          channel: '#deployments'
          text: '🚀 Production deployment successful! Version: ${{ github.ref_name }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Rollback on failure
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: failure() && startsWith(github.ref, 'refs/tags/v')
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ secrets.AWS_REGION_PROD }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION_PROD }} --name ${{ secrets.EKS_CLUSTER_NAME_PROD }}

      - name: Rollback deployment
        run: |
          helm rollback cancer-genomics-prod -n cancer-genomics-prod

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#deployments'
          text: '🚨 Production deployment failed and rolled back! Version: ${{ github.ref_name }}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
