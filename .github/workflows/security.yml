name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 2 AM
  workflow_dispatch:

# CodeQL analyze + SARIF upload require elevated token scopes on private repos.
permissions:
  contents: read
  security-events: write

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      # Safety 3.x broke `--output <filename>`; pip-audit stays deterministic for CI.
      - name: Dependency vulnerability report
        run: |
          pip-audit \
            -r CancerGenomicsSuite/requirements.txt \
            --format json \
            --output safety-report.json \
            || echo '{"dependencies":[],"vulnerabilities":[]}' > safety-report.json
          pip-audit -r CancerGenomicsSuite/requirements.txt --desc || true

      - name: Upload safety report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: safety-report
          path: safety-report.json

  code-scan:
    name: Code Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit

      - name: Run Bandit security scan
        run: |
          bandit -r CancerGenomicsSuite/ -f json -o bandit-report.json
          bandit -r CancerGenomicsSuite/ -ll --exit-zero

      - name: Upload bandit report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bandit-report
          path: bandit-report.json

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: cancer-genomics-analysis-suite:security-scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # trivy-action v0.33.x can fail while bootstrapping the Trivy binary; use the official image.
      - name: Run Trivy vulnerability scanner
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/workspace" \
            aquasec/trivy:0.58.1 image \
            --severity CRITICAL --exit-code 0 \
            --format sarif --output /workspace/trivy-results.sarif \
            cancer-genomics-analysis-suite:security-scan

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        with:
          sarif_file: 'trivy-results.sarif'

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # Pushes to the default branch set base=head=main; TruffleHog rejects that range.
      - name: Resolve TruffleHog git range
        id: truffle_range
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BEFORE="${{ github.event.before }}"
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            echo "base=$BEFORE" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            echo "base=$(git rev-parse HEAD~1)" >> "$GITHUB_OUTPUT"
          else
            echo "base=$(git rev-list --max-parents=0 HEAD)" >> "$GITHUB_OUTPUT"
          fi
          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Run TruffleHog OSS
        if: steps.truffle_range.outputs.base != steps.truffle_range.outputs.head
        uses: trufflesecurity/trufflehog@a05cf0859455b5b16317ee22d809887a4043cdf0 # v3.90.2
        with:
          path: ./
          base: ${{ steps.truffle_range.outputs.base }}
          head: ${{ steps.truffle_range.outputs.head }}
          extra_args: --debug --only-verified

      - name: TruffleHog skipped (no diff range)
        if: steps.truffle_range.outputs.base == steps.truffle_range.outputs.head
        run: echo "TruffleHog git compare skipped: base and head are identical (single-commit repo or empty push range)."

  license-scan:
    name: License Compliance Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-licenses

      - name: Generate license report
        run: |
          pip-licenses --format=json --output-file=licenses.json
          pip-licenses --format=html --output-file=licenses.html

      - name: Upload license reports
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: license-reports
          path: |
            licenses.json
            licenses.html

  sast-scan:
    name: Static Application Security Testing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4

  infrastructure-scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@3203f966a7ccd680cd8f6aaa3c3c5b0b3e9afa32 # v12
        with:
          directory: .
          framework: kubernetes,terraform,dockerfile
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@b25d0ebf40e5b63ee81e1bd6e5d2a12b7c2aeb61 # v4
        with:
          sarif_file: checkov-results.sarif

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, code-scan, container-scan, secrets-scan, license-scan, sast-scan, infrastructure-scan]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4

      - name: Generate security summary
        run: |
          echo "# Security Scan Summary" > security-summary.md
          echo "" >> security-summary.md
          echo "## Scan Results" >> security-summary.md
          echo "" >> security-summary.md
          
          if [ -f "safety-report/safety-report.json" ]; then
            echo "✅ Dependency scan completed" >> security-summary.md
          else
            echo "❌ Dependency scan failed" >> security-summary.md
          fi
          
          if [ -f "bandit-report/bandit-report.json" ]; then
            echo "✅ Code security scan completed" >> security-summary.md
          else
            echo "❌ Code security scan failed" >> security-summary.md
          fi
          
          if [ -f "trivy-results.sarif" ]; then
            echo "✅ Container security scan completed" >> security-summary.md
          else
            echo "❌ Container security scan failed" >> security-summary.md
          fi
          
          if [ -f "license-reports/licenses.json" ] || [ -f "licenses.json" ]; then
            echo "✅ License compliance scan completed" >> security-summary.md
          else
            echo "❌ License compliance scan failed" >> security-summary.md
          fi
          
          echo "" >> security-summary.md
          echo "## Next Steps" >> security-summary.md
          echo "" >> security-summary.md
          echo "1. Review any security findings" >> security-summary.md
          echo "2. Address high and critical vulnerabilities" >> security-summary.md
          echo "3. Update dependencies if needed" >> security-summary.md
          echo "4. Document any accepted risks" >> security-summary.md

      - name: Upload security summary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-summary
          path: security-summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('security-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });

  notify-security-team:
    name: Notify Security Team
    runs-on: ubuntu-latest
    needs: [security-summary]
    if: failure()
    steps:
      - name: Notify on security issues
        run: |
          echo "🚨 Security scan detected issues that require attention"
          echo "Please review the security scan results and address any critical findings"
