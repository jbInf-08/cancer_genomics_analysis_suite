            import json
            
            # Load analysis results
            results = pd.read_csv('{{inputs.parameters.analysis-results}}')
            
            # Generate visualizations
            plt.figure(figsize=(12, 8))
            sns.heatmap(results.corr(), annot=True, cmap='coolwarm')
            plt.title('Correlation Matrix')
            plt.savefig('/tmp/{{inputs.parameters.sample-id}}_correlation_matrix.png')
            plt.close()
            
            # Generate report HTML
            report_template = '''
            <!DOCTYPE html>
            <html>
            <head>
                <title>Cancer Genomics Analysis Report - {{inputs.parameters.sample-id}}</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 40px; }
                    .header { background-color: #f0f0f0; padding: 20px; border-radius: 5px; }
                    .section { margin: 20px 0; }
                    .metric { display: inline-block; margin: 10px; padding: 10px; background-color: #e8f4f8; border-radius: 3px; }
                </style>
            </head>
            <body>
                <div class='header'>
                    <h1>Cancer Genomics Analysis Report</h1>
                    <p>Sample ID: {{inputs.parameters.sample-id}}</p>
                    <p>Generated: {{datetime.now().strftime('%Y-%m-%d %H:%M:%S')}}</p>
                </div>
                
                <div class='section'>
                    <h2>Summary Statistics</h2>
                    <div class='metric'>Total Variants: {{results.shape[0]}}</div>
                    <div class='metric'>Total Genes: {{results['gene'].nunique()}}</div>
                    <div class='metric'>Mean Expression: {{results['expression'].mean():.2f}}</div>
                </div>
                
                <div class='section'>
                    <h2>Visualizations</h2>
                    <img src='{{inputs.parameters.sample-id}}_correlation_matrix.png' alt='Correlation Matrix' style='max-width: 100%;'>
                </div>
                
                <div class='section'>
                    <h2>Top Variants</h2>
                    {{results.head(10).to_html()}}
                </div>
            </body>
            </html>
            '''
            
            # Render report
            template = Template(report_template)
            report_html = template.render(
                sample_id='{{inputs.parameters.sample-id}}',
                results=results,
                datetime=__import__('datetime').datetime
            )
            
            # Save report
            with open('/tmp/{{inputs.parameters.sample-id}}_report.html', 'w') as f:
                f.write(report_html)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_report.html"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

