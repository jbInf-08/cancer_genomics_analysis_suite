---
# Advanced Argo Workflow Templates for Cancer Genomics Analysis
# This file contains comprehensive workflow templates for various genomics pipelines

apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cancer-genomics-variant-calling
  namespace: argo
  labels:
    app: cancer-genomics
    workflow-type: variant-calling
spec:
  entrypoint: variant-calling-workflow
  arguments:
    parameters:
      - name: input-fastq
        value: ""
      - name: reference-genome
        value: "hg38"
      - name: sample-id
        value: ""
      - name: output-bucket
        value: ""
      - name: cpu-limit
        value: "8"
      - name: memory-limit
        value: "32Gi"
  
  templates:
    - name: variant-calling-workflow
      dag:
        tasks:
          - name: quality-control
            template: fastqc
            arguments:
              parameters:
                - name: input-fastq
                  value: "{{workflow.parameters.input-fastq}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: trimming
            template: trimmomatic
            dependencies: [quality-control]
            arguments:
              parameters:
                - name: input-fastq
                  value: "{{workflow.parameters.input-fastq}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: alignment
            template: bwa-mem
            dependencies: [trimming]
            arguments:
              parameters:
                - name: trimmed-fastq
                  value: "{{tasks.trimming.outputs.parameters.trimmed-fastq}}"
                - name: reference-genome
                  value: "{{workflow.parameters.reference-genome}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: mark-duplicates
            template: mark-duplicates
            dependencies: [alignment]
            arguments:
              parameters:
                - name: input-bam
                  value: "{{tasks.alignment.outputs.parameters.output-bam}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: base-quality-recalibration
            template: bqsr
            dependencies: [mark-duplicates]
            arguments:
              parameters:
                - name: input-bam
                  value: "{{tasks.mark-duplicates.outputs.parameters.output-bam}}"
                - name: reference-genome
                  value: "{{workflow.parameters.reference-genome}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: variant-calling
            template: mutect2
            dependencies: [base-quality-recalibration]
            arguments:
              parameters:
                - name: input-bam
                  value: "{{tasks.base-quality-recalibration.outputs.parameters.output-bam}}"
                - name: reference-genome
                  value: "{{workflow.parameters.reference-genome}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: variant-filtering
            template: filter-variants
            dependencies: [variant-calling]
            arguments:
              parameters:
                - name: input-vcf
                  value: "{{tasks.variant-calling.outputs.parameters.output-vcf}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: variant-annotation
            template: annovar
            dependencies: [variant-filtering]
            arguments:
              parameters:
                - name: input-vcf
                  value: "{{tasks.variant-filtering.outputs.parameters.output-vcf}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: upload-results
            template: upload-to-s3
            dependencies: [variant-annotation]
            arguments:
              parameters:
                - name: input-files
                  value: "{{tasks.variant-annotation.outputs.parameters.annotated-vcf}}"
                - name: output-bucket
                  value: "{{workflow.parameters.output-bucket}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"

    - name: fastqc
      inputs:
        parameters:
          - name: input-fastq
          - name: sample-id
      outputs:
        parameters:
          - name: fastqc-report
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_fastqc.html
      container:
        image: biocontainers/fastqc:v0.11.9_cv8
        command: [sh, -c]
        args:
          - |
            fastqc {{inputs.parameters.input-fastq}} -o /tmp
            echo "{{inputs.parameters.sample-id}}_fastqc.html"
        resources:
          requests:
            memory: "2Gi"
            cpu: "2"
          limits:
            memory: "4Gi"
            cpu: "4"

    - name: trimmomatic
      inputs:
        parameters:
          - name: input-fastq
          - name: sample-id
      outputs:
        parameters:
          - name: trimmed-fastq
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_trimmed_R1.fastq.gz
      container:
        image: biocontainers/trimmomatic:v0.39-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            trimmomatic PE {{inputs.parameters.input-fastq}} \
              /tmp/{{inputs.parameters.sample-id}}_trimmed_R1.fastq.gz /tmp/{{inputs.parameters.sample-id}}_unpaired_R1.fastq.gz \
              /tmp/{{inputs.parameters.sample-id}}_trimmed_R2.fastq.gz /tmp/{{inputs.parameters.sample-id}}_unpaired_R2.fastq.gz \
              ILLUMINACLIP:TruSeq3-PE.fa:2:30:10 \
              LEADING:3 TRAILING:3 SLIDINGWINDOW:4:15 MINLEN:36
            echo "/tmp/{{inputs.parameters.sample-id}}_trimmed_R1.fastq.gz"
        resources:
          requests:
            memory: "4Gi"
            cpu: "4"
          limits:
            memory: "8Gi"
            cpu: "8"

    - name: bwa-mem
      inputs:
        parameters:
          - name: trimmed-fastq
          - name: reference-genome
          - name: sample-id
      outputs:
        parameters:
          - name: output-bam
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}.bam
      container:
        image: biocontainers/bwa:v0.7.17_cv1
        command: [sh, -c]
        args:
          - |
            bwa mem -t 8 /reference/{{inputs.parameters.reference-genome}}.fa {{inputs.parameters.trimmed-fastq}} | \
            samtools view -bS - > /tmp/{{inputs.parameters.sample-id}}.bam
            echo "/tmp/{{inputs.parameters.sample-id}}.bam"
        resources:
          requests:
            memory: "8Gi"
            cpu: "8"
          limits:
            memory: "16Gi"
            cpu: "16"

    - name: mark-duplicates
      inputs:
        parameters:
          - name: input-bam
          - name: sample-id
      outputs:
        parameters:
          - name: output-bam
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_dedup.bam
      container:
        image: broadinstitute/gatk:4.3.0.0
        command: [sh, -c]
        args:
          - |
            gatk MarkDuplicates \
              -I {{inputs.parameters.input-bam}} \
              -O /tmp/{{inputs.parameters.sample-id}}_dedup.bam \
              -M /tmp/{{inputs.parameters.sample-id}}_dedup.metrics
            echo "/tmp/{{inputs.parameters.sample-id}}_dedup.bam"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

    - name: bqsr
      inputs:
        parameters:
          - name: input-bam
          - name: reference-genome
          - name: sample-id
      outputs:
        parameters:
          - name: output-bam
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_recal.bam
      container:
        image: broadinstitute/gatk:4.3.0.0
        command: [sh, -c]
        args:
          - |
            gatk BaseRecalibrator \
              -I {{inputs.parameters.input-bam}} \
              -R /reference/{{inputs.parameters.reference-genome}}.fa \
              --known-sites /reference/dbsnp.vcf.gz \
              -O /tmp/{{inputs.parameters.sample-id}}_recal.table
            
            gatk ApplyBQSR \
              -I {{inputs.parameters.input-bam}} \
              -R /reference/{{inputs.parameters.reference-genome}}.fa \
              -bqsr /tmp/{{inputs.parameters.sample-id}}_recal.table \
              -O /tmp/{{inputs.parameters.sample-id}}_recal.bam
            echo "/tmp/{{inputs.parameters.sample-id}}_recal.bam"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

    - name: mutect2
      inputs:
        parameters:
          - name: input-bam
          - name: reference-genome
          - name: sample-id
      outputs:
        parameters:
          - name: output-vcf
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_variants.vcf
      container:
        image: broadinstitute/gatk:4.3.0.0
        command: [sh, -c]
        args:
          - |
            gatk Mutect2 \
              -I {{inputs.parameters.input-bam}} \
              -R /reference/{{inputs.parameters.reference-genome}}.fa \
              -O /tmp/{{inputs.parameters.sample-id}}_variants.vcf
            echo "/tmp/{{inputs.parameters.sample-id}}_variants.vcf"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

    - name: filter-variants
      inputs:
        parameters:
          - name: input-vcf
          - name: sample-id
      outputs:
        parameters:
          - name: output-vcf
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_filtered.vcf
      container:
        image: broadinstitute/gatk:4.3.0.0
        command: [sh, -c]
        args:
          - |
            gatk FilterMutectCalls \
              -V {{inputs.parameters.input-vcf}} \
              -O /tmp/{{inputs.parameters.sample-id}}_filtered.vcf
            echo "/tmp/{{inputs.parameters.sample-id}}_filtered.vcf"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"

    - name: annovar
      inputs:
        parameters:
          - name: input-vcf
          - name: sample-id
      outputs:
        parameters:
          - name: annotated-vcf
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_annotated.vcf
      container:
        image: biocontainers/annovar:2018Apr16-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            convert2annovar.pl -format vcf4 {{inputs.parameters.input-vcf}} > /tmp/{{inputs.parameters.sample-id}}.avinput
            annotate_variation.pl -geneanno -buildver hg38 /tmp/{{inputs.parameters.sample-id}}.avinput /humandb/
            echo "/tmp/{{inputs.parameters.sample-id}}_annotated.vcf"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"

    - name: upload-to-s3
      inputs:
        parameters:
          - name: input-files
          - name: output-bucket
          - name: sample-id
      container:
        image: amazon/aws-cli:latest
        command: [sh, -c]
        args:
          - |
            aws s3 cp {{inputs.parameters.input-files}} s3://{{inputs.parameters.output-bucket}}/results/{{inputs.parameters.sample-id}}/
        env:
          - name: AWS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: access-key-id
          - name: AWS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: aws-credentials
                key: secret-access-key
        resources:
          requests:
            memory: "1Gi"
            cpu: "1"
          limits:
            memory: "2Gi"
            cpu: "2"

---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cancer-genomics-expression-analysis
  namespace: argo
  labels:
    app: cancer-genomics
    workflow-type: expression-analysis
spec:
  entrypoint: expression-analysis-workflow
  arguments:
    parameters:
      - name: input-fastq
        value: ""
      - name: reference-genome
        value: "hg38"
      - name: gtf-file
        value: "hg38.gtf"
      - name: sample-id
        value: ""
      - name: output-bucket
        value: ""
      - name: cpu-limit
        value: "8"
      - name: memory-limit
        value: "32Gi"
  
  templates:
    - name: expression-analysis-workflow
      dag:
        tasks:
          - name: quality-control
            template: fastqc
            arguments:
              parameters:
                - name: input-fastq
                  value: "{{workflow.parameters.input-fastq}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: trimming
            template: trimmomatic
            dependencies: [quality-control]
            arguments:
              parameters:
                - name: input-fastq
                  value: "{{workflow.parameters.input-fastq}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: alignment
            template: star-align
            dependencies: [trimming]
            arguments:
              parameters:
                - name: trimmed-fastq
                  value: "{{tasks.trimming.outputs.parameters.trimmed-fastq}}"
                - name: reference-genome
                  value: "{{workflow.parameters.reference-genome}}"
                - name: gtf-file
                  value: "{{workflow.parameters.gtf-file}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: quantification
            template: featurecounts
            dependencies: [alignment]
            arguments:
              parameters:
                - name: input-bam
                  value: "{{tasks.alignment.outputs.parameters.output-bam}}"
                - name: gtf-file
                  value: "{{workflow.parameters.gtf-file}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: quality-assessment
            template: rseqc
            dependencies: [alignment]
            arguments:
              parameters:
                - name: input-bam
                  value: "{{tasks.alignment.outputs.parameters.output-bam}}"
                - name: gtf-file
                  value: "{{workflow.parameters.gtf-file}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: upload-results
            template: upload-to-s3
            dependencies: [quantification, quality-assessment]
            arguments:
              parameters:
                - name: input-files
                  value: "{{tasks.quantification.outputs.parameters.counts-file}}"
                - name: output-bucket
                  value: "{{workflow.parameters.output-bucket}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"

    - name: star-align
      inputs:
        parameters:
          - name: trimmed-fastq
          - name: reference-genome
          - name: gtf-file
          - name: sample-id
      outputs:
        parameters:
          - name: output-bam
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}Aligned.sortedByCoord.out.bam
      container:
        image: biocontainers/star:v2.7.9a-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            STAR --runMode alignReads \
              --genomeDir /star_index/{{inputs.parameters.reference-genome}} \
              --readFilesIn {{inputs.parameters.trimmed-fastq}} \
              --readFilesCommand zcat \
              --outSAMtype BAM SortedByCoordinate \
              --outFileNamePrefix /tmp/{{inputs.parameters.sample-id}} \
              --runThreadN 8
            echo "/tmp/{{inputs.parameters.sample-id}}Aligned.sortedByCoord.out.bam"
        resources:
          requests:
            memory: "16Gi"
            cpu: "8"
          limits:
            memory: "32Gi"
            cpu: "16"

    - name: featurecounts
      inputs:
        parameters:
          - name: input-bam
          - name: gtf-file
          - name: sample-id
      outputs:
        parameters:
          - name: counts-file
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_counts.txt
      container:
        image: biocontainers/subread:v2.0.3-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            featureCounts -a /reference/{{inputs.parameters.gtf-file}} -o /tmp/{{inputs.parameters.sample-id}}_counts.txt {{inputs.parameters.input-bam}}
            echo "/tmp/{{inputs.parameters.sample-id}}_counts.txt"
        resources:
          requests:
            memory: "4Gi"
            cpu: "4"
          limits:
            memory: "8Gi"
            cpu: "8"

    - name: rseqc
      inputs:
        parameters:
          - name: input-bam
          - name: gtf-file
          - name: sample-id
      outputs:
        parameters:
          - name: coverage-file
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_geneBodyCoverage.txt
      container:
        image: biocontainers/rseqc:v4.0.0-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            geneBody_coverage.py -i {{inputs.parameters.input-bam}} -r /reference/{{inputs.parameters.gtf-file}} -o /tmp/{{inputs.parameters.sample-id}}
            echo "/tmp/{{inputs.parameters.sample-id}}_geneBodyCoverage.txt"
        resources:
          requests:
            memory: "4Gi"
            cpu: "4"
          limits:
            memory: "8Gi"
            cpu: "8"

---
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cancer-genomics-multi-omics
  namespace: argo
  labels:
    app: cancer-genomics
    workflow-type: multi-omics
spec:
  entrypoint: multi-omics-workflow
  arguments:
    parameters:
      - name: genomics-data
        value: ""
      - name: transcriptomics-data
        value: ""
      - name: epigenomics-data
        value: ""
      - name: sample-id
        value: ""
      - name: output-bucket
        value: ""
      - name: cpu-limit
        value: "16"
      - name: memory-limit
        value: "64Gi"
  
  templates:
    - name: multi-omics-workflow
      dag:
        tasks:
          - name: process-genomics
            template: process-genomics-data
            arguments:
              parameters:
                - name: input-vcf
                  value: "{{workflow.parameters.genomics-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: process-transcriptomics
            template: process-transcriptomics-data
            arguments:
              parameters:
                - name: input-bam
                  value: "{{workflow.parameters.transcriptomics-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: process-epigenomics
            template: process-epigenomics-data
            arguments:
              parameters:
                - name: input-bed
                  value: "{{workflow.parameters.epigenomics-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: integrate-omics
            template: integrate-omics-data
            dependencies: [process-genomics, process-transcriptomics, process-epigenomics]
            arguments:
              parameters:
                - name: genomics-data
                  value: "{{tasks.process-genomics.outputs.parameters.processed-vcf}}"
                - name: transcriptomics-data
                  value: "{{tasks.process-transcriptomics.outputs.parameters.expression-data}}"
                - name: epigenomics-data
                  value: "{{tasks.process-epigenomics.outputs.parameters.processed-bed}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: pathway-analysis
            template: pathway-analysis
            dependencies: [integrate-omics]
            arguments:
              parameters:
                - name: integrated-data
                  value: "{{tasks.integrate-omics.outputs.parameters.integrated-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: upload-results
            template: upload-to-s3
            dependencies: [pathway-analysis]
            arguments:
              parameters:
                - name: input-files
                  value: "{{tasks.pathway-analysis.outputs.parameters.results-file}}"
                - name: output-bucket
                  value: "{{workflow.parameters.output-bucket}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"

    - name: process-genomics-data
      inputs:
        parameters:
          - name: input-vcf
          - name: sample-id
      outputs:
        parameters:
          - name: processed-vcf
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_genomics_processed.vcf
      container:
        image: biocontainers/bcftools:v1.15.1-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            bcftools filter -i 'QUAL>20 && DP>10' {{inputs.parameters.input-vcf}} > /tmp/{{inputs.parameters.sample-id}}_genomics_processed.vcf
            echo "/tmp/{{inputs.parameters.sample-id}}_genomics_processed.vcf"
        resources:
          requests:
            memory: "4Gi"
            cpu: "4"
          limits:
            memory: "8Gi"
            cpu: "8"

    - name: process-transcriptomics-data
      inputs:
        parameters:
          - name: input-bam
          - name: sample-id
      outputs:
        parameters:
          - name: expression-data
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_transcriptomics_expression.txt
      container:
        image: biocontainers/subread:v2.0.3-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            featureCounts -a /reference/hg38.gtf -o /tmp/{{inputs.parameters.sample-id}}_counts.txt {{inputs.parameters.input-bam}}
            # Normalize expression
            Rscript -e "
            counts <- read.table('/tmp/{{inputs.parameters.sample-id}}_counts.txt', header=TRUE, row.names=1)
            normalized <- log2(counts + 1)
            write.table(normalized, '/tmp/{{inputs.parameters.sample-id}}_transcriptomics_expression.txt', sep='\t', quote=FALSE)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_transcriptomics_expression.txt"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

    - name: process-epigenomics-data
      inputs:
        parameters:
          - name: input-bed
          - name: sample-id
      outputs:
        parameters:
          - name: processed-bed
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_epigenomics_processed.bed
      container:
        image: biocontainers/bedtools:v2.30.0-1-deb_cv1
        command: [sh, -c]
        args:
          - |
            sort -k1,1 -k2,2n {{inputs.parameters.input-bed}} > /tmp/{{inputs.parameters.sample-id}}_sorted.bed
            bedtools merge -i /tmp/{{inputs.parameters.sample-id}}_sorted.bed > /tmp/{{inputs.parameters.sample-id}}_epigenomics_processed.bed
            echo "/tmp/{{inputs.parameters.sample-id}}_epigenomics_processed.bed"
        resources:
          requests:
            memory: "4Gi"
            cpu: "4"
          limits:
            memory: "8Gi"
            cpu: "8"

    - name: integrate-omics-data
      inputs:
        parameters:
          - name: genomics-data
          - name: transcriptomics-data
          - name: epigenomics-data
          - name: sample-id
      outputs:
        parameters:
          - name: integrated-data
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_integrated_omics_data.csv
      container:
        image: r-base:4.2.0
        command: [sh, -c]
        args:
          - |
            Rscript -e "
            library(GenomicRanges)
            library(SummarizedExperiment)
            
            # Read genomics data
            genomics <- read.table('{{inputs.parameters.genomics-data}}', header=TRUE)
            
            # Read transcriptomics data
            transcriptomics <- read.table('{{inputs.parameters.transcriptomics-data}}', header=TRUE)
            
            # Read epigenomics data
            epigenomics <- read.table('{{inputs.parameters.epigenomics-data}}', header=FALSE)
            
            # Integrate data
            integrated_data <- data.frame(
              gene_id = rownames(transcriptomics),
              expression = transcriptomics[,1],
              mutation_count = sapply(rownames(transcriptomics), function(gene) {
                sum(genomics[genomics[,'Gene.refGene'] == gene, 'ExonicFunc.refGene'] != 'synonymous SNV')
              }),
              peak_count = sapply(rownames(transcriptomics), function(gene) {
                nrow(epigenomics)
              })
            )
            
            write.csv(integrated_data, '/tmp/{{inputs.parameters.sample-id}}_integrated_omics_data.csv', row.names=FALSE)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_integrated_omics_data.csv"
        resources:
          requests:
            memory: "16Gi"
            cpu: "8"
          limits:
            memory: "32Gi"
            cpu: "16"

    - name: pathway-analysis
      inputs:
        parameters:
          - name: integrated-data
          - name: sample-id
      outputs:
        parameters:
          - name: results-file
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_pathway_analysis_results.csv
      container:
        image: r-base:4.2.0
        command: [sh, -c]
        args:
          - |
            Rscript -e "
            library(clusterProfiler)
            library(org.Hs.eg.db)
            library(ggplot2)
            
            # Read integrated data
            data <- read.csv('{{inputs.parameters.integrated-data}}')
            
            # Perform pathway analysis
            gene_list <- data[data[,'expression'] > 2, 'gene_id']
            
            # Convert gene symbols to ENTREZ IDs
            gene_entrez <- bitr(gene_list, fromType='SYMBOL', toType='ENTREZID', OrgDb=org.Hs.eg.db)
            
            # GO enrichment
            go_results <- enrichGO(gene=gene_entrez[,'ENTREZID'], 
                                  OrgDb=org.Hs.eg.db, 
                                  ont='BP', 
                                  pAdjustMethod='BH')
            
            # KEGG enrichment
            kegg_results <- enrichKEGG(gene=gene_entrez[,'ENTREZID'], 
                                      organism='hsa', 
                                      pAdjustMethod='BH')
            
            # Save results
            write.csv(go_results@result, '/tmp/{{inputs.parameters.sample-id}}_pathway_analysis_results.csv')
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_pathway_analysis_results.csv"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

