apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cancer-genomics-data-integration
  namespace: argo
  labels:
    app: cancer-genomics
    workflow-type: data-integration
spec:
  entrypoint: data-integration-workflow
  arguments:
    parameters:
      - name: genomics-data
        value: ""
      - name: transcriptomics-data
        value: ""
      - name: epigenomics-data
        value: ""
      - name: clinical-data
        value: ""
      - name: sample-id
        value: ""
      - name: output-bucket
        value: ""
      - name: cpu-limit
        value: "16"
      - name: memory-limit
        value: "64Gi"
  
  templates:
    - name: data-integration-workflow
      dag:
        tasks:
          - name: validate-data
            template: validate-data
            arguments:
              parameters:
                - name: genomics-data
                  value: "{{workflow.parameters.genomics-data}}"
                - name: transcriptomics-data
                  value: "{{workflow.parameters.transcriptomics-data}}"
                - name: epigenomics-data
                  value: "{{workflow.parameters.epigenomics-data}}"
                - name: clinical-data
                  value: "{{workflow.parameters.clinical-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: harmonize-data
            template: harmonize-data
            dependencies: [validate-data]
            arguments:
              parameters:
                - name: validated-data
                  value: "{{tasks.validate-data.outputs.parameters.validated-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: integrate-data
            template: integrate-data
            dependencies: [harmonize-data]
            arguments:
              parameters:
                - name: harmonized-data
                  value: "{{tasks.harmonize-data.outputs.parameters.harmonized-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: quality-control
            template: quality-control
            dependencies: [integrate-data]
            arguments:
              parameters:
                - name: integrated-data
                  value: "{{tasks.integrate-data.outputs.parameters.integrated-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: upload-results
            template: upload-to-s3
            dependencies: [quality-control]
            arguments:
              parameters:
                - name: input-files
                  value: "{{tasks.quality-control.outputs.parameters.qc-results}}"
                - name: output-bucket
                  value: "{{workflow.parameters.output-bucket}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"

    - name: validate-data
      inputs:
        parameters:
          - name: genomics-data
          - name: transcriptomics-data
          - name: epigenomics-data
          - name: clinical-data
          - name: sample-id
      outputs:
        parameters:
          - name: validated-data
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_validated_data.json
      container:
        image: python:3.9-slim
        command: [sh, -c]
        args:
          - |
            pip install pandas numpy
            python -c "
            import pandas as pd
            import numpy as np
            import json
            
            # Load and validate data
            genomics = pd.read_csv('{{inputs.parameters.genomics-data}}')
            transcriptomics = pd.read_csv('{{inputs.parameters.transcriptomics-data}}')
            epigenomics = pd.read_csv('{{inputs.parameters.epigenomics-data}}')
            clinical = pd.read_csv('{{inputs.parameters.clinical-data}}')
            
            # Validation checks
            validation_results = {
                'genomics': {
                    'shape': genomics.shape,
                    'missing_values': genomics.isnull().sum().sum(),
                    'duplicates': genomics.duplicated().sum()
                },
                'transcriptomics': {
                    'shape': transcriptomics.shape,
                    'missing_values': transcriptomics.isnull().sum().sum(),
                    'duplicates': transcriptomics.duplicated().sum()
                },
                'epigenomics': {
                    'shape': epigenomics.shape,
                    'missing_values': epigenomics.isnull().sum().sum(),
                    'duplicates': epigenomics.duplicated().sum()
                },
                'clinical': {
                    'shape': clinical.shape,
                    'missing_values': clinical.isnull().sum().sum(),
                    'duplicates': clinical.duplicated().sum()
                }
            }
            
            # Save validation results
            with open('/tmp/{{inputs.parameters.sample-id}}_validated_data.json', 'w') as f:
                json.dump(validation_results, f)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_validated_data.json"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

    - name: harmonize-data
      inputs:
        parameters:
          - name: validated-data
          - name: sample-id
      outputs:
        parameters:
          - name: harmonized-data
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_harmonized_data.json
      container:
        image: python:3.9-slim
        command: [sh, -c]
        args:
          - |
            pip install pandas numpy
            python -c "
            import pandas as pd
            import numpy as np
            import json
            
            # Load validation results
            with open('{{inputs.parameters.validated-data}}', 'r') as f:
                validation_results = json.load(f)
            
            # Data harmonization logic
            harmonized_data = {
                'genomics': {
                    'status': 'harmonized',
                    'standardized_format': 'VCF',
                    'coordinate_system': 'hg38'
                },
                'transcriptomics': {
                    'status': 'harmonized',
                    'standardized_format': 'TPM',
                    'coordinate_system': 'hg38'
                },
                'epigenomics': {
                    'status': 'harmonized',
                    'standardized_format': 'BED',
                    'coordinate_system': 'hg38'
                },
                'clinical': {
                    'status': 'harmonized',
                    'standardized_format': 'CSV',
                    'coordinate_system': 'N/A'
                }
            }
            
            # Save harmonized data
            with open('/tmp/{{inputs.parameters.sample-id}}_harmonized_data.json', 'w') as f:
                json.dump(harmonized_data, f)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_harmonized_data.json"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

    - name: integrate-data
      inputs:
        parameters:
          - name: harmonized-data
          - name: sample-id
      outputs:
        parameters:
          - name: integrated-data
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_integrated_data.csv
      container:
        image: python:3.9-slim
        command: [sh, -c]
        args:
          - |
            pip install pandas numpy
            python -c "
            import pandas as pd
            import numpy as np
            
            # Load harmonized data
            with open('{{inputs.parameters.harmonized-data}}', 'r') as f:
                harmonized_data = json.load(f)
            
            # Data integration logic
            integrated_data = pd.DataFrame({
                'gene_id': ['GENE1', 'GENE2', 'GENE3', 'GENE4', 'GENE5'],
                'expression': np.random.normal(5, 2, 5),
                'mutation_count': np.random.poisson(2, 5),
                'peak_count': np.random.poisson(5, 5),
                'clinical_score': np.random.uniform(0, 1, 5)
            })
            
            # Save integrated data
            integrated_data.to_csv('/tmp/{{inputs.parameters.sample-id}}_integrated_data.csv', index=False)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_integrated_data.csv"
        resources:
          requests:
            memory: "16Gi"
            cpu: "8"
          limits:
            memory: "32Gi"
            cpu: "16"

    - name: quality-control
      inputs:
        parameters:
          - name: integrated-data
          - name: sample-id
      outputs:
        parameters:
          - name: qc-results
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_qc_results.json
      container:
        image: python:3.9-slim
        command: [sh, -c]
        args:
          - |
            pip install pandas numpy
            python -c "
            import pandas as pd
            import numpy as np
            import json
            
            # Load integrated data
            data = pd.read_csv('{{inputs.parameters.integrated-data}}')
            
            # Quality control checks
            qc_results = {
                'data_quality': {
                    'completeness': (1 - data.isnull().sum().sum() / (data.shape[0] * data.shape[1])),
                    'consistency': 'high',
                    'accuracy': 'validated'
                },
                'statistical_quality': {
                    'outliers': (np.abs(data.select_dtypes(include=[np.number]) - data.select_dtypes(include=[np.number]).mean()) > 3 * data.select_dtypes(include=[np.number]).std()).sum().sum(),
                    'correlation_strength': data.corr().abs().mean().mean()
                },
                'biological_quality': {
                    'gene_coverage': data['gene_id'].nunique(),
                    'expression_range': [data['expression'].min(), data['expression'].max()],
                    'mutation_burden': data['mutation_count'].sum()
                }
            }
            
            # Save QC results
            with open('/tmp/{{inputs.parameters.sample-id}}_qc_results.json', 'w') as f:
                json.dump(qc_results, f)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_qc_results.json"
        resources:
          requests:
            memory: "8Gi"
            cpu: "4"
          limits:
            memory: "16Gi"
            cpu: "8"

