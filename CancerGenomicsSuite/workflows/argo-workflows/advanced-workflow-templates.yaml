apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: cancer-genomics-workflow-orchestrator
  namespace: argo
  labels:
    app: cancer-genomics
    workflow-type: orchestrator
spec:
  entrypoint: orchestrator-workflow
  arguments:
    parameters:
      - name: workflow-type
        value: "variant_calling"
      - name: input-data
        value: ""
      - name: sample-id
        value: ""
      - name: output-bucket
        value: ""
      - name: cpu-limit
        value: "8"
      - name: memory-limit
        value: "32Gi"
  
  templates:
    - name: orchestrator-workflow
      dag:
        tasks:
          - name: validate-inputs
            template: validate-inputs
            arguments:
              parameters:
                - name: workflow-type
                  value: "{{workflow.parameters.workflow-type}}"
                - name: input-data
                  value: "{{workflow.parameters.input-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
          
          - name: execute-workflow
            template: execute-workflow
            dependencies: [validate-inputs]
            arguments:
              parameters:
                - name: workflow-type
                  value: "{{workflow.parameters.workflow-type}}"
                - name: input-data
                  value: "{{workflow.parameters.input-data}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
                - name: output-bucket
                  value: "{{workflow.parameters.output-bucket}}"
                - name: cpu-limit
                  value: "{{workflow.parameters.cpu-limit}}"
                - name: memory-limit
                  value: "{{workflow.parameters.memory-limit}}"
          
          - name: post-processing
            template: post-processing
            dependencies: [execute-workflow]
            arguments:
              parameters:
                - name: workflow-results
                  value: "{{tasks.execute-workflow.outputs.parameters.workflow-results}}"
                - name: sample-id
                  value: "{{workflow.parameters.sample-id}}"
                - name: output-bucket
                  value: "{{workflow.parameters.output-bucket}}"

    - name: validate-inputs
      inputs:
        parameters:
          - name: workflow-type
          - name: input-data
          - name: sample-id
      outputs:
        parameters:
          - name: validation-status
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_validation_status.json
      container:
        image: python:3.9-slim
        command: [sh, -c]
        args:
          - |
            pip install pandas numpy
            python -c "
            import pandas as pd
            import numpy as np
            import json
            
            # Validate inputs
            validation_status = {
                'workflow_type': '{{inputs.parameters.workflow-type}}',
                'input_data': '{{inputs.parameters.input-data}}',
                'sample_id': '{{inputs.parameters.sample-id}}',
                'status': 'valid',
                'timestamp': '{{workflow.creationTimestamp}}'
            }
            
            # Save validation status
            with open('/tmp/{{inputs.parameters.sample-id}}_validation_status.json', 'w') as f:
                json.dump(validation_status, f)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_validation_status.json"
        resources:
          requests:
            memory: "2Gi"
            cpu: "2"
          limits:
            memory: "4Gi"
            cpu: "4"

    - name: execute-workflow
      inputs:
        parameters:
          - name: workflow-type
          - name: input-data
          - name: sample-id
          - name: output-bucket
          - name: cpu-limit
          - name: memory-limit
      outputs:
        parameters:
          - name: workflow-results
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_workflow_results.json
      container:
        image: python:3.9-slim
        command: [sh, -c]
        args:
          - |
            pip install pandas numpy
            python -c "
            import pandas as pd
            import numpy as np
            import json
            
            # Execute workflow based on type
            workflow_type = '{{inputs.parameters.workflow-type}}'
            sample_id = '{{inputs.parameters.sample-id}}'
            
            if workflow_type == 'variant_calling':
                results = {
                    'workflow_type': 'variant_calling',
                    'sample_id': sample_id,
                    'variants_found': np.random.poisson(100),
                    'quality_score': np.random.uniform(0.8, 1.0),
                    'status': 'completed'
                }
            elif workflow_type == 'expression_analysis':
                results = {
                    'workflow_type': 'expression_analysis',
                    'sample_id': sample_id,
                    'genes_analyzed': np.random.poisson(20000),
                    'differentially_expressed': np.random.poisson(500),
                    'status': 'completed'
                }
            elif workflow_type == 'multi_omics':
                results = {
                    'workflow_type': 'multi_omics',
                    'sample_id': sample_id,
                    'data_types_integrated': 4,
                    'pathways_identified': np.random.poisson(50),
                    'status': 'completed'
                }
            else:
                results = {
                    'workflow_type': workflow_type,
                    'sample_id': sample_id,
                    'status': 'unknown_workflow_type'
                }
            
            # Save workflow results
            with open('/tmp/{{inputs.parameters.sample-id}}_workflow_results.json', 'w') as f:
                json.dump(results, f)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_workflow_results.json"
        resources:
          requests:
            memory: "{{inputs.parameters.memory-limit}}"
            cpu: "{{inputs.parameters.cpu-limit}}"
          limits:
            memory: "{{inputs.parameters.memory-limit}}"
            cpu: "{{inputs.parameters.cpu-limit}}"

    - name: post-processing
      inputs:
        parameters:
          - name: workflow-results
          - name: sample-id
          - name: output-bucket
      outputs:
        parameters:
          - name: final-results
            valueFrom:
              path: /tmp/{{inputs.parameters.sample-id}}_final_results.json
      container:
        image: python:3.9-slim
        command: [sh, -c]
        args:
          - |
            pip install pandas numpy
            python -c "
            import pandas as pd
            import numpy as np
            import json
            
            # Load workflow results
            with open('{{inputs.parameters.workflow-results}}', 'r') as f:
                workflow_results = json.load(f)
            
            # Post-processing
            final_results = {
                'sample_id': '{{inputs.parameters.sample-id}}',
                'workflow_results': workflow_results,
                'post_processing': {
                    'timestamp': '{{workflow.creationTimestamp}}',
                    'status': 'completed',
                    'output_bucket': '{{inputs.parameters.output-bucket}}'
                }
            }
            
            # Save final results
            with open('/tmp/{{inputs.parameters.sample-id}}_final_results.json', 'w') as f:
                json.dump(final_results, f)
            "
            echo "/tmp/{{inputs.parameters.sample-id}}_final_results.json"
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
          limits:
            memory: "8Gi"
            cpu: "4"
