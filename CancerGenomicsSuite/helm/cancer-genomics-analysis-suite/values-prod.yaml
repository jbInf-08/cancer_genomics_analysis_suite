# Production environment values
global:
  cloudProvider: "aws"
  region: "us-west-2"
  aws:
    eksClusterName: "cancer-genomics-prod"
    loadBalancerType: "nlb"
    s3Bucket: "cancer-genomics-prod-data"
    rdsInstance: "cancer-genomics-prod-db"
    elasticacheCluster: "cancer-genomics-prod-cache"

# Production-specific overrides
web:
  replicaCount: 3
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 1Gi
  env:
    - name: FLASK_ENV
      value: "production"
    - name: LOG_LEVEL
      value: "WARNING"
    - name: DEBUG
      value: "false"

celery:
  worker:
    replicaCount: 3
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 500m
        memory: 1Gi
    env:
      - name: FLASK_ENV
        value: "production"
      - name: LOG_LEVEL
        value: "WARNING"

# Use external RDS in production
postgresql:
  enabled: false

# Use external ElastiCache in production
redis:
  enabled: false

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
  hosts:
    - host: cancer-genomics.yourdomain.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: cancer-genomics-prod-tls
      hosts:
        - cancer-genomics.yourdomain.com

# Production features
config:
  features:
    auth_enabled: true
    api_enabled: true
    dashboard_enabled: true
    reporting_enabled: true
    ml_enabled: true
    blast_enabled: true
    annotation_enabled: true

# Enable full monitoring in production
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s
  prometheusRule:
    enabled: true
  grafana:
    enabled: true
    dashboard:
      enabled: true

# Enable Argo Workflows for production
argoWorkflows:
  enabled: true
  namespace: "argo-prod"
  templates:
    blastPipeline:
      enabled: true
      resources:
        limits:
          cpu: 4000m
          memory: 8Gi
        requests:
          cpu: 1000m
          memory: 2Gi
    annotationPipeline:
      enabled: true
      resources:
        limits:
          cpu: 2000m
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
    mlPipeline:
      enabled: true
      resources:
        limits:
          cpu: 8000m
          memory: 16Gi
        requests:
          cpu: 2000m
          memory: 4Gi
    reportingPipeline:
      enabled: true
      resources:
        limits:
          cpu: 2000m
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
  cronWorkflows:
    enabled: true
    schedules:
      - name: "daily-blast-analysis"
        schedule: "0 2 * * *"
        workflowTemplate: "blast-pipeline"
      - name: "weekly-ml-training"
        schedule: "0 3 * * 0"
        workflowTemplate: "ml-pipeline"
      - name: "daily-report-generation"
        schedule: "0 4 * * *"
        workflowTemplate: "reporting-pipeline"
  monitoring:
    enabled: true
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
    grafana:
      enabled: true
      dashboard:
        enabled: true

# Production secrets (should be managed externally)
secrets:
  database:
    create: false  # Use external secret management
    name: "rds-credentials"
  app:
    create: false  # Use external secret management
    name: "app-secrets"
  apis:
    create: false  # Use external secret management
    name: "api-secrets"

# Enable autoscaling in production
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 60

# Enable pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Enable network policies
networkPolicy:
  enabled: true
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8050

# Enable backup in production
backup:
  enabled: true
  schedule: "0 1 * * *"  # Daily at 1 AM
  retention: "30d"
  storage:
    enabled: true
    size: 100Gi
    storageClass: "aws-ebs-gp3"

# Security configurations
security:
  podSecurityPolicy:
    enabled: true
  networkPolicy:
    enabled: true
  rbac:
    create: true
