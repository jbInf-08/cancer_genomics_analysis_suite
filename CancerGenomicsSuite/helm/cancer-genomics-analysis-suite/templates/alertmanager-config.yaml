{{- if .Values.monitoring.enabled }}
{{- if .Values.monitoring.alertmanager.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-alertmanager-config
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: '{{ .Values.monitoring.alertmanager.smtp.smarthost }}'
      smtp_from: '{{ .Values.monitoring.alertmanager.smtp.from }}'
      smtp_auth_username: '{{ .Values.monitoring.alertmanager.smtp.username }}'
      smtp_auth_password: '{{ .Values.monitoring.alertmanager.smtp.password }}'
      smtp_require_tls: true
      
      slack_api_url: '{{ .Values.monitoring.alertmanager.slack.apiUrl }}'
      
      webhook_url: '{{ .Values.monitoring.alertmanager.webhook.url }}'
      webhook_critical_url: '{{ .Values.monitoring.alertmanager.webhook.critical }}'
      webhook_security_url: '{{ .Values.monitoring.alertmanager.webhook.security }}'
    
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'web.hook'
      routes:
        # Critical mutations - immediate notification
        - match:
            severity: critical
            service: mutation-analysis
          receiver: 'critical-mutations'
          group_wait: 0s
          repeat_interval: 5m
        
        # High severity mutations - urgent notification
        - match:
            severity: high
            service: mutation-analysis
          receiver: 'high-mutations'
          group_wait: 30s
          repeat_interval: 15m
        
        # System health alerts
        - match:
            service: infrastructure
          receiver: 'system-alerts'
          group_wait: 1m
          repeat_interval: 30m
        
        # Security alerts
        - match:
            service: security
          receiver: 'security-alerts'
          group_wait: 0s
          repeat_interval: 10m
        
        # Database alerts
        - match:
            service: database
          receiver: 'database-alerts'
          group_wait: 1m
          repeat_interval: 15m
        
        # Kafka alerts
        - match:
            service: kafka
          receiver: 'kafka-alerts'
          group_wait: 1m
          repeat_interval: 15m
        
        # Neo4j alerts
        - match:
            service: neo4j
          receiver: 'neo4j-alerts'
          group_wait: 1m
          repeat_interval: 15m
        
        # Workflow alerts
        - match:
            service: workflows
          receiver: 'workflow-alerts'
          group_wait: 2m
          repeat_interval: 30m
    
    receivers:
      # Critical mutations - immediate notification via multiple channels
      - name: 'critical-mutations'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.critical }}'
            subject: '🚨 CRITICAL: Dangerous Mutation Detected'
            body: |
              A critical mutation has been detected that requires immediate attention.
              
              Alert: {{ .GroupLabels.alertname }}
              Severity: {{ .GroupLabels.severity }}
              Gene: {{ .GroupLabels.gene }}
              Patient: {{ .GroupLabels.patient_id }}
              Time: {{ .GroupLabels.timestamp }}
              
              Please investigate immediately.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
            headers:
              X-Priority: '1'
        
        slack_configs:
          - channel: '#critical-alerts'
            title: '🚨 Critical Mutation Alert'
            text: |
              *Critical Mutation Detected*
              
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Gene:* {{ .Labels.gene }}
              *Patient:* {{ .Labels.patient_id }}
              *Time:* {{ .StartsAt }}
              {{ end }}
            color: 'danger'
            send_resolved: true
        
        webhook_configs:
          - url: '{{ .Values.monitoring.alertmanager.webhook.critical }}'
            send_resolved: true
            http_config:
              basic_auth:
                username: '{{ .Values.monitoring.alertmanager.webhook.username }}'
                password: '{{ .Values.monitoring.alertmanager.webhook.password }}'
      
      # High severity mutations
      - name: 'high-mutations'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.highImpact }}'
            subject: '⚠️ HIGH: High-Impact Mutation Detected'
            body: |
              A high-impact mutation has been detected.
              
              Alert: {{ .GroupLabels.alertname }}
              Severity: {{ .GroupLabels.severity }}
              Gene: {{ .GroupLabels.gene }}
              Patient: {{ .GroupLabels.patient_id }}
              
              Please review and take appropriate action.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
        
        slack_configs:
          - channel: '#mutation-alerts'
            title: '⚠️ High-Impact Mutation'
            text: |
              *High-Impact Mutation Detected*
              
              {{ range .Alerts }}
              *Alert:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              *Gene:* {{ .Labels.gene }}
              *Patient:* {{ .Labels.patient_id }}
              {{ end }}
            color: 'warning'
            send_resolved: true
      
      # System alerts
      - name: 'system-alerts'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.system }}'
            subject: 'System Alert: {{ .GroupLabels.alertname }}'
            body: |
              System alert detected.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
        
        slack_configs:
          - channel: '#system-alerts'
            title: 'System Alert'
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
            color: 'warning'
      
      # Security alerts
      - name: 'security-alerts'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.security }}'
            subject: '🔒 SECURITY ALERT: {{ .GroupLabels.alertname }}'
            body: |
              Security alert detected.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
              
              Please investigate immediately.
        
        slack_configs:
          - channel: '#security-alerts'
            title: '🔒 Security Alert'
            text: |
              *Security Alert Detected*
              
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
            color: 'danger'
        
        webhook_configs:
          - url: '{{ .Values.monitoring.alertmanager.webhook.security }}'
            send_resolved: true
      
      # Database alerts
      - name: 'database-alerts'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.system }}'
            subject: 'Database Alert: {{ .GroupLabels.alertname }}'
            body: |
              Database alert detected.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
        
        slack_configs:
          - channel: '#database-alerts'
            title: 'Database Alert'
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
            color: 'warning'
      
      # Kafka alerts
      - name: 'kafka-alerts'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.system }}'
            subject: 'Kafka Alert: {{ .GroupLabels.alertname }}'
            body: |
              Kafka alert detected.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
        
        slack_configs:
          - channel: '#kafka-alerts'
            title: 'Kafka Alert'
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
            color: 'warning'
      
      # Neo4j alerts
      - name: 'neo4j-alerts'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.system }}'
            subject: 'Neo4j Alert: {{ .GroupLabels.alertname }}'
            body: |
              Neo4j alert detected.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
        
        slack_configs:
          - channel: '#neo4j-alerts'
            title: 'Neo4j Alert'
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
            color: 'warning'
      
      # Workflow alerts
      - name: 'workflow-alerts'
        email_configs:
          - to: '{{ .Values.monitoring.alertmanager.email.pipeline }}'
            subject: 'Workflow Alert: {{ .GroupLabels.alertname }}'
            body: |
              Workflow alert detected.
              
              {{ range .Alerts }}
              - {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}
        
        slack_configs:
          - channel: '#workflow-alerts'
            title: 'Workflow Alert'
            text: |
              {{ range .Alerts }}
              *{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
            color: 'warning'
      
      # Default webhook receiver
      - name: 'web.hook'
        webhook_configs:
          - url: '{{ .Values.monitoring.alertmanager.webhook.url }}'
            send_resolved: true
    
    inhibit_rules:
      # Inhibit high severity alerts when critical alerts are firing
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'high'
        equal: ['alertname', 'cluster', 'service']
      
      # Inhibit warning alerts when high severity alerts are firing
      - source_match:
          severity: 'high'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'cluster', 'service']
      
      # Inhibit individual pod alerts when node alerts are firing
      - source_match:
          alertname: 'NodeDown'
        target_match_re:
          alertname: 'Pod.*'
        equal: ['node']
      
      # Inhibit individual service alerts when cluster alerts are firing
      - source_match:
          alertname: 'ClusterDown'
        target_match_re:
          alertname: 'Service.*'
        equal: ['cluster']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-alertmanager
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 6 }}
      component: alertmanager
  template:
    metadata:
      labels:
        {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 8 }}
        component: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:{{ .Values.monitoring.alertmanager.image.tag | default "v0.25.0" }}
          imagePullPolicy: {{ .Values.monitoring.alertmanager.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 9093
              protocol: TCP
          args:
            - '--config.file=/etc/alertmanager/alertmanager.yml'
            - '--storage.path=/alertmanager'
            - '--web.external-url=http://localhost:9093'
            - '--web.route-prefix=/'
            - '--cluster.listen-address=0.0.0.0:9094'
            - '--cluster.peer=alertmanager-0.alertmanager:9094'
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: storage
              mountPath: /alertmanager
          resources:
            {{- toYaml .Values.monitoring.alertmanager.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9093
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9093
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-alertmanager-config
        - name: storage
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-alertmanager
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: alertmanager
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      protocol: TCP
  selector:
    {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 4 }}
    component: alertmanager

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-alertmanager-headless
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: alertmanager
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      protocol: TCP
    - name: cluster
      port: 9094
      targetPort: 9094
      protocol: TCP
  selector:
    {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 4 }}
    component: alertmanager
{{- end }}
{{- end }}
