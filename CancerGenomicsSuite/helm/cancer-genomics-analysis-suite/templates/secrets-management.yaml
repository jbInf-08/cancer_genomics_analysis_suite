{{- if .Values.security.secrets.rotation.enabled }}
# Secret Rotation CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-rotation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
spec:
  schedule: {{ .Values.security.secrets.rotation.schedule | default "0 2 * * *" }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 12 }}
            component: secrets
        spec:
          serviceAccountName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-rotation
          restartPolicy: OnFailure
          containers:
          - name: secret-rotation
            image: {{ .Values.security.secrets.rotation.image | default "bitnami/kubectl:latest" }}
            command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e
              
              echo "Starting secret rotation process..."
              
              # Rotate database password
              if [ "$ROTATE_DB_PASSWORD" = "true" ]; then
                echo "Rotating database password..."
                NEW_PASSWORD=$(openssl rand -base64 32)
                kubectl patch secret {{ include "cancer-genomics-analysis-suite.fullname" . }}-postgresql -p='{"data":{"postgres-password":"'$(echo -n "$NEW_PASSWORD" | base64)'"}}'
                echo "Database password rotated successfully"
              fi
              
              # Rotate Redis password
              if [ "$ROTATE_REDIS_PASSWORD" = "true" ]; then
                echo "Rotating Redis password..."
                NEW_PASSWORD=$(openssl rand -base64 32)
                kubectl patch secret {{ include "cancer-genomics-analysis-suite.fullname" . }}-redis -p='{"data":{"redis-password":"'$(echo -n "$NEW_PASSWORD" | base64)'"}}'
                echo "Redis password rotated successfully"
              fi
              
              # Rotate application secrets
              if [ "$ROTATE_APP_SECRETS" = "true" ]; then
                echo "Rotating application secrets..."
                NEW_SECRET_KEY=$(openssl rand -base64 64)
                NEW_JWT_SECRET=$(openssl rand -base64 64)
                kubectl patch secret {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets -p='{"data":{"secret-key":"'$(echo -n "$NEW_SECRET_KEY" | base64)'","jwt-secret-key":"'$(echo -n "$NEW_JWT_SECRET" | base64)'"}}'
                echo "Application secrets rotated successfully"
              fi
              
              # Restart pods to pick up new secrets
              if [ "$RESTART_PODS" = "true" ]; then
                echo "Restarting pods to pick up new secrets..."
                kubectl rollout restart deployment {{ include "cancer-genomics-analysis-suite.fullname" . }}-web
                kubectl rollout restart deployment {{ include "cancer-genomics-analysis-suite.fullname" . }}-celery-worker
                echo "Pods restarted successfully"
              fi
              
              echo "Secret rotation process completed"
            env:
            - name: ROTATE_DB_PASSWORD
              value: {{ .Values.security.secrets.rotation.rotateDbPassword | default "true" | quote }}
            - name: ROTATE_REDIS_PASSWORD
              value: {{ .Values.security.secrets.rotation.rotateRedisPassword | default "true" | quote }}
            - name: ROTATE_APP_SECRETS
              value: {{ .Values.security.secrets.rotation.rotateAppSecrets | default "true" | quote }}
            - name: RESTART_PODS
              value: {{ .Values.security.secrets.rotation.restartPods | default "true" | quote }}
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
---
# Secret Rotation Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-rotation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
---
# Secret Rotation RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-rotation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "patch", "update"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments/status"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-rotation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-rotation
subjects:
- kind: ServiceAccount
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-rotation
  namespace: {{ .Release.Namespace }}
{{- end }}
---
{{- if .Values.security.secrets.audit.enabled }}
# Secret Audit CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-audit
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
spec:
  schedule: {{ .Values.security.secrets.audit.schedule | default "0 */6 * * *" }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 12 }}
            component: secrets
        spec:
          serviceAccountName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-audit
          restartPolicy: OnFailure
          containers:
          - name: secret-audit
            image: {{ .Values.security.secrets.audit.image | default "bitnami/kubectl:latest" }}
            command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e
              
              echo "Starting secret audit process..."
              
              # Audit secret access
              echo "Auditing secret access..."
              kubectl get events --field-selector involvedObject.kind=Secret --sort-by='.lastTimestamp' -o json > /tmp/secret-events.json
              
              # Check for suspicious secret access patterns
              echo "Checking for suspicious secret access patterns..."
              kubectl get events --field-selector involvedObject.kind=Secret,reason=SecretAccess --sort-by='.lastTimestamp' -o json > /tmp/secret-access-events.json
              
              # Log audit results
              echo "Secret audit completed at $(date)"
              echo "Audit results saved to /tmp/secret-events.json and /tmp/secret-access-events.json"
              
              # Send audit report if webhook is configured
              if [ -n "$AUDIT_WEBHOOK_URL" ]; then
                echo "Sending audit report to webhook..."
                curl -X POST "$AUDIT_WEBHOOK_URL" \
                  -H "Content-Type: application/json" \
                  -d '{"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'","namespace":"{{ .Release.Namespace }}","audit_type":"secret_access","status":"completed"}'
              fi
            env:
            - name: AUDIT_WEBHOOK_URL
              value: {{ .Values.security.secrets.audit.webhookUrl | default "" | quote }}
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
---
# Secret Audit Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-audit
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
---
# Secret Audit RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-audit
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
rules:
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-audit
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-audit
subjects:
- kind: ServiceAccount
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secrets-audit
  namespace: {{ .Release.Namespace }}
{{- end }}
---
{{- if .Values.security.secrets.validation.enabled }}
# Secret Validation Webhook
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionWebhook
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
webhooks:
- name: secret-validation.cancer-genomics.io
  clientConfig:
    service:
      name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
      namespace: {{ .Release.Namespace }}
      path: "/validate-secrets"
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["secrets"]
  failurePolicy: Fail
  sideEffects: None
  admissionReviewVersions: ["v1", "v1beta1"]
---
# Secret Validation Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
spec:
  ports:
  - port: 443
    targetPort: 8443
  selector:
    {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 4 }}
    component: secret-validation
---
# Secret Validation Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 6 }}
      component: secret-validation
  template:
    metadata:
      labels:
        {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 8 }}
        component: secret-validation
    spec:
      serviceAccountName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
      containers:
      - name: secret-validation
        image: {{ .Values.security.secrets.validation.image | default "gcr.io/kubebuilder/kube-rbac-proxy:v0.8.0" }}
        ports:
        - containerPort: 8443
        env:
        - name: VALIDATION_RULES
          value: {{ .Values.security.secrets.validation.rules | toJson | quote }}
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
---
# Secret Validation Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
---
# Secret Validation RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingadmissionwebhooks"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
subjects:
- kind: ServiceAccount
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-secret-validation
  namespace: {{ .Release.Namespace }}
{{- end }}
