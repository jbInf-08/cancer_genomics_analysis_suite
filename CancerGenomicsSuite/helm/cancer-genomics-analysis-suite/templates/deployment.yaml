              value: {{ .Values.config.celery.broker_url | quote }}
            - name: CELERY_RESULT_BACKEND
              value: {{ .Values.config.celery.result_backend | quote }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
