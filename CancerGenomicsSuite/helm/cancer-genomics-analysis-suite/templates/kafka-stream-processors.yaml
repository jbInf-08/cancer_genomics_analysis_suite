---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-stream-processors
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: stream-processor
spec:
  selector:
    matchLabels:
      {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 6 }}
      component: stream-processor
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
{{- end }}