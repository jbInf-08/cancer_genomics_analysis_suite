{{- if .Values.secrets.app.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cancer-genomics-analysis-suite.secretName" . }}
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
type: Opaque
data:
  # Base64 encoded secrets - CHANGE THESE IN PRODUCTION!
  # To generate: echo -n "your-secret" | base64
  secret-key: {{ .Values.secrets.app.data.SECRET_KEY | b64enc }}
  jwt-secret-key: {{ .Values.secrets.app.data.JWT_SECRET_KEY | b64enc }}
  {{- if .Values.secrets.apis.create }}
  ensembl-api-key: {{ .Values.secrets.apis.data.ENSEMBL_API_KEY | b64enc }}
  uniprot-api-key: {{ .Values.secrets.apis.data.UNIPROT_API_KEY | b64enc }}
  clinvar-api-key: {{ .Values.secrets.apis.data.CLINVAR_API_KEY | b64enc }}
  {{- end }}
{{- end }}
---
{{- if .Values.secrets.database.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cancer-genomics-analysis-suite.postgresql.secretName" . }}
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
type: Opaque
data:
  postgres-user: {{ .Values.secrets.database.data.POSTGRES_USER | b64enc }}
  postgres-password: {{ .Values.secrets.database.data.POSTGRES_PASSWORD | b64enc }}
  postgres-db: {{ .Values.secrets.database.data.POSTGRES_DB | b64enc }}
{{- end }}
