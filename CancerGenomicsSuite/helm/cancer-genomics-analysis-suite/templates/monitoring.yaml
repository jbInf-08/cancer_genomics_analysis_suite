{{- if .Values.monitoring.enabled }}
{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-monitor
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    {{- with .Values.monitoring.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 6 }}
      component: web
  endpoints:
  - port: metrics
    path: /metrics
    interval: {{ .Values.monitoring.serviceMonitor.interval }}
    scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
{{- end }}
---
{{- if .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-rules
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    {{- with .Values.monitoring.prometheusRule.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
  - name: cancer-genomics-analysis-suite
    rules:
    - alert: CancerGenomicsDown
      expr: up{job="{{ include "cancer-genomics-analysis-suite.fullname" . }}-web"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Cancer Genomics service is down"
        description: "Cancer Genomics web service has been down for more than 1 minute."
    
    - alert: CancerGenomicsHighErrorRate
      expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
      for: 2m
      labels:
        severity: warning
      annotations:
        summary: "High error rate detected"
        description: "Error rate is {{ $value }} errors per second."
    
    - alert: CancerGenomicsHighResponseTime
      expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High response time detected"
        description: "95th percentile response time is {{ $value }} seconds."
    
    - alert: CancerGenomicsDatabaseConnection
      expr: up{job="{{ include "cancer-genomics-analysis-suite.postgresql.fullname" . }}"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Database connection lost"
        description: "PostgreSQL database is not accessible."
    
    - alert: CancerGenomicsRedisConnection
      expr: up{job="{{ include "cancer-genomics-analysis-suite.redis.fullname" . }}"} == 0
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Redis connection lost"
        description: "Redis cache is not accessible."
    
    - alert: CancerGenomicsHighMemoryUsage
      expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage"
        description: "Memory usage is above 80% for {{ $labels.pod }}."
    
    - alert: CancerGenomicsHighCPUUsage
      expr: (rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * container_spec_cpu_period) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage"
        description: "CPU usage is above 80% for {{ $labels.pod }}."
{{- end }}
{{- end }}
