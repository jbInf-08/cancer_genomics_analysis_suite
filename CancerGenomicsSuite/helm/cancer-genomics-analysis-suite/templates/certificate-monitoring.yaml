{{- if .Values.security.certificateMonitoring.enabled }}
# Certificate Monitoring CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: certificate-monitoring
spec:
  schedule: {{ .Values.security.certificateMonitoring.schedule | default "0 */6 * * *" }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 12 }}
            component: certificate-monitoring
        spec:
          serviceAccountName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
          restartPolicy: OnFailure
          containers:
          - name: cert-monitor
            image: {{ .Values.security.certificateMonitoring.image | default "bitnami/kubectl:latest" }}
            command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              set -e
              
              echo "Starting certificate monitoring..."
              
              # Check certificate expiration
              kubectl get certificates -o json | jq -r '.items[] | select(.status.conditions[] | select(.type=="Ready" and .status=="True")) | "\(.metadata.name) \(.status.notAfter)"' > /tmp/cert-expiry.txt
              
              # Check for certificates expiring within 30 days
              while IFS= read -r line; do
                cert_name=$(echo "$line" | awk '{print $1}')
                expiry_date=$(echo "$line" | awk '{print $2}')
                expiry_timestamp=$(date -d "$expiry_date" +%s)
                current_timestamp=$(date +%s)
                days_until_expiry=$(( (expiry_timestamp - current_timestamp) / 86400 ))
                
                if [ $days_until_expiry -lt 30 ]; then
                  echo "WARNING: Certificate $cert_name expires in $days_until_expiry days"
                  # Send alert if webhook is configured
                  if [ -n "$ALERT_WEBHOOK_URL" ]; then
                    curl -X POST "$ALERT_WEBHOOK_URL" \
                      -H "Content-Type: application/json" \
                      -d "{\"alert_type\":\"certificate_expiry\",\"certificate\":\"$cert_name\",\"days_until_expiry\":$days_until_expiry,\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
                  fi
                fi
              done < /tmp/cert-expiry.txt
              
              echo "Certificate monitoring completed"
            env:
            - name: ALERT_WEBHOOK_URL
              value: {{ .Values.security.certificateMonitoring.alertWebhookUrl | default "" | quote }}
            resources:
              limits:
                cpu: 100m
                memory: 128Mi
              requests:
                cpu: 50m
                memory: 64Mi
---
# Certificate Monitoring Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: certificate-monitoring
---
# Certificate Monitoring RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: certificate-monitoring
rules:
- apiGroups: ["cert-manager.io"]
  resources: ["certificates"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: certificate-monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
subjects:
- kind: ServiceAccount
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
  namespace: {{ .Release.Namespace }}
{{- end }}
