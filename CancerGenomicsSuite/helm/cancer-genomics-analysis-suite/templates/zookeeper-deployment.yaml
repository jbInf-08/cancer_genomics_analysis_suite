{{- if .Values.kafka.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: zookeeper
spec:
  replicas: {{ .Values.zookeeper.replicaCount }}
  selector:
    matchLabels:
      {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 6 }}
      component: zookeeper
  template:
    metadata:
      labels:
        {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 8 }}
        component: zookeeper
    spec:
      serviceAccountName: {{ include "cancer-genomics-analysis-suite.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: zookeeper
          image: "{{ .Values.zookeeper.image.registry }}/{{ .Values.zookeeper.image.repository }}:{{ .Values.zookeeper.image.tag }}"
          imagePullPolicy: {{ .Values.zookeeper.image.pullPolicy }}
          ports:
            - name: client
              containerPort: 2181
              protocol: TCP
            - name: follower
              containerPort: 2888
              protocol: TCP
            - name: election
              containerPort: 3888
              protocol: TCP
            - name: jmx
              containerPort: 9999
              protocol: TCP
          env:
            - name: ZOOKEEPER_CLIENT_PORT
              value: "2181"
            - name: ZOOKEEPER_TICK_TIME
              value: "2000"
            - name: ZOOKEEPER_INIT_LIMIT
              value: "5"
            - name: ZOOKEEPER_SYNC_LIMIT
              value: "2"
            - name: ZOOKEEPER_MAX_CLIENT_CNXNS
              value: "60"
            - name: ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT
              value: "3"
            - name: ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL
              value: "24"
            - name: ZOOKEEPER_LOG4J_LOGGERS
              value: "org.apache.zookeeper=INFO"
            {{- with .Values.zookeeper.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.zookeeper.resources | nindent 12 }}
          volumeMounts:
            - name: zookeeper-data
              mountPath: /var/lib/zookeeper/data
            - name: zookeeper-logs
              mountPath: /var/lib/zookeeper/logs
            - name: zookeeper-config
              mountPath: /opt/zookeeper/conf
          livenessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: 2181
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      volumes:
        - name: zookeeper-data
          persistentVolumeClaim:
            claimName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper-data
        - name: zookeeper-logs
          persistentVolumeClaim:
            claimName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper-logs
        - name: zookeeper-config
          configMap:
            name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper-config
      {{- with .Values.zookeeper.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.zookeeper.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.zookeeper.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: zookeeper
spec:
  type: ClusterIP
  ports:
    - port: 2181
      targetPort: 2181
      protocol: TCP
      name: client
    - port: 2888
      targetPort: 2888
      protocol: TCP
      name: follower
    - port: 3888
      targetPort: 3888
      protocol: TCP
      name: election
    - port: 9999
      targetPort: 9999
      protocol: TCP
      name: jmx
  selector:
    {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 4 }}
    component: zookeeper
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper-data
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: zookeeper
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.zookeeper.persistence.dataSize }}
  {{- if .Values.zookeeper.persistence.storageClass }}
  storageClassName: {{ .Values.zookeeper.persistence.storageClass }}
  {{- end }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper-logs
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: zookeeper
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.zookeeper.persistence.logsSize }}
  {{- if .Values.zookeeper.persistence.storageClass }}
  storageClassName: {{ .Values.zookeeper.persistence.storageClass }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-zookeeper-config
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: zookeeper
data:
  zoo.cfg: |
    # ZooKeeper configuration
    tickTime=${ZOOKEEPER_TICK_TIME}
    dataDir=/var/lib/zookeeper/data
    dataLogDir=/var/lib/zookeeper/logs
    clientPort=${ZOOKEEPER_CLIENT_PORT}
    initLimit=${ZOOKEEPER_INIT_LIMIT}
    syncLimit=${ZOOKEEPER_SYNC_LIMIT}
    maxClientCnxns=${ZOOKEEPER_MAX_CLIENT_CNXNS}
    autopurge.snapRetainCount=${ZOOKEEPER_AUTOPURGE_SNAP_RETAIN_COUNT}
    autopurge.purgeInterval=${ZOOKEEPER_AUTOPURGE_PURGE_INTERVAL}
    
    # Performance tuning
    preAllocSize=65536
    snapCount=100000
    maxSessionTimeout=40000
    minSessionTimeout=4000
    
    # Logging
    log4j.rootLogger=INFO, CONSOLE
    log4j.appender.CONSOLE=org.apache.log4j.ConsoleAppender
    log4j.appender.CONSOLE.Threshold=INFO
    log4j.appender.CONSOLE.layout=org.apache.log4j.PatternLayout
    log4j.appender.CONSOLE.layout.ConversionPattern=%d{ISO8601} [myid:%X{myid}] - %-5p [%t:%C{1}@%L] - %m%n
{{- end }}
