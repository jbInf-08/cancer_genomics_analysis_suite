# SealedSecret for external API keys
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-api-keys-sealed
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: api-keys
spec:
  encryptedData:
    {{- if .Values.sealedSecrets.apiKeys.ensemblApiKey }}
    ENSEMBL_API_KEY: {{ .Values.sealedSecrets.apiKeys.ensemblApiKey | b64enc | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.apiKeys.uniprotApiKey }}
    UNIPROT_API_KEY: {{ .Values.sealedSecrets.apiKeys.uniprotApiKey | b64enc | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.apiKeys.clinvarApiKey }}
    CLINVAR_API_KEY: {{ .Values.sealedSecrets.apiKeys.clinvarApiKey | b64enc | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.apiKeys.cosmicApiKey }}
    COSMIC_API_KEY: {{ .Values.sealedSecrets.apiKeys.cosmicApiKey | b64enc | quote }}
    {{- end }}
    {{- if .Values.sealedSecrets.apiKeys.ncbiApiKey }}
    NCBI_API_KEY: {{ .Values.sealedSecrets.apiKeys.ncbiApiKey | b64enc | quote }}
    {{- end }}
  template:
    metadata:
      name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-api-keys-secrets
      labels:
        {{- include "cancer-genomics-analysis-suite.labels" . | nindent 8 }}
        component: api-keys
    type: Opaque
---
# SealedSecret for OAuth credentials
