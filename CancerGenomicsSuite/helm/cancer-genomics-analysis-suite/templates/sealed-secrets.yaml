spec:
  encryptedData:
    SECRET_KEY: {{ .Values.sealedSecrets.app.secretKey | b64enc | quote }}
    JWT_SECRET_KEY: {{ .Values.sealedSecrets.app.jwtSecretKey | b64enc | quote }}
    FLASK_SECRET_KEY: {{ .Values.sealedSecrets.app.flaskSecretKey | b64enc | quote }}
  template:
