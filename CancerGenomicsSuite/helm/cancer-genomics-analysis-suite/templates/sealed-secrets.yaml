{{- if .Values.sealedSecrets.enabled }}
# SealedSecret for database credentials
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-database-sealed
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: database
spec:
  encryptedData:
    POSTGRES_USER: {{ .Values.sealedSecrets.database.postgresUser | b64enc | quote }}
    POSTGRES_PASSWORD: {{ .Values.sealedSecrets.database.postgresPassword | b64enc | quote }}
    POSTGRES_DB: {{ .Values.sealedSecrets.database.postgresDb | b64enc | quote }}
  template:
    metadata:
      name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-database-secrets
      labels:
        {{- include "cancer-genomics-analysis-suite.labels" . | nindent 8 }}
        component: database
    type: Opaque
---
# SealedSecret for application secrets
apiVersion: bitnami.com/v1alpha1
