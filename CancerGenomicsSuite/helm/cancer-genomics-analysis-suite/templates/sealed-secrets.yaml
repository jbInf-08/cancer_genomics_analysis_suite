    GITHUB_CLIENT_ID: {{ .Values.sealedSecrets.oauth.githubClientId | b64enc | quote }}
    GITHUB_CLIENT_SECRET: {{ .Values.sealedSecrets.oauth.githubClientSecret | b64enc | quote }}
