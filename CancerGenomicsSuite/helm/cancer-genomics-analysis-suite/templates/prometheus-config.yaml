{{- if .Values.monitoring.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-prometheus-config
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'cancer-genomics-cluster'
        environment: '{{ .Values.config.app.environment }}'

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      # Kubernetes API server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https

      # Kubernetes nodes
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
        - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - action: labelmap
          regex: __meta_kubernetes_node_label_(.+)
        - target_label: __address__
          replacement: kubernetes.default.svc:443
        - source_labels: [__meta_kubernetes_node_name]
          regex: (.+)
          target_label: __metrics_path__
          replacement: /api/v1/nodes/${1}/proxy/metrics

      # Kubernetes pods
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name

      # Cancer Genomics Web Application
      - job_name: 'cancer-genomics-web'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - {{ .Release.Namespace }}
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: {{ include "cancer-genomics-analysis-suite.fullname" . }}-web
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

      # Cancer Genomics Celery Workers
      - job_name: 'cancer-genomics-celery'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - {{ .Release.Namespace }}
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: {{ include "cancer-genomics-analysis-suite.fullname" . }}-celery
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

      # Kafka
      - job_name: 'kafka'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - {{ .Release.Namespace }}
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: {{ include "cancer-genomics-analysis-suite.fullname" . }}-kafka
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

      # Neo4j
      - job_name: 'neo4j'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - {{ .Release.Namespace }}
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: {{ include "cancer-genomics-analysis-suite.fullname" . }}-neo4j
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

      # Kafka Stream Processors
      - job_name: 'kafka-stream-processors'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - {{ .Release.Namespace }}
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: {{ include "cancer-genomics-analysis-suite.fullname" . }}-stream-processor
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

      # PostgreSQL
      - job_name: 'postgresql'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - {{ .Release.Namespace }}
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: {{ include "cancer-genomics-analysis-suite.postgresql.fullname" . }}
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

      # Redis
      - job_name: 'redis'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - {{ .Release.Namespace }}
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: {{ include "cancer-genomics-analysis-suite.redis.fullname" . }}-master
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

      # Argo Workflows
      - job_name: 'argo-workflows'
        kubernetes_sd_configs:
        - role: endpoints
        namespaces:
          names:
          - argo
        relabel_configs:
        - source_labels: [__meta_kubernetes_service_name]
          action: keep
          regex: argo-workflows-server-metrics
        - source_labels: [__meta_kubernetes_endpoint_port_name]
          action: keep
          regex: metrics
        - source_labels: [__meta_kubernetes_namespace]
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_service_name]
          target_label: kubernetes_service_name

  alert-rules.yml: |
    groups:
    - name: cancer-genomics-alerts
      rules:
      # Application Health
      - alert: CancerGenomicsDown
        expr: up{job=~"cancer-genomics-.*"} == 0
        for: 1m
        labels:
          severity: critical
          service: cancer-genomics
        annotations:
          summary: "Cancer Genomics service is down"
          description: "Cancer Genomics service {{ "{{" }} $labels.job {{ "}}" }} has been down for more than 1 minute."

      - alert: CancerGenomicsHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: cancer-genomics
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ "{{" }} $value {{ "}}" }} errors per second for {{ "{{" }} $labels.job {{ "}}" }}."

      - alert: CancerGenomicsHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
          service: cancer-genomics
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ "{{" }} $value {{ "}}" }} seconds for {{ "{{" }} $labels.job {{ "}}" }}."

      # Database Health
      - alert: DatabaseConnectionLost
        expr: up{job="postgresql"} == 0
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection lost"
          description: "PostgreSQL database is not accessible."

      - alert: DatabaseHighConnections
        expr: pg_stat_database_numbackends / pg_settings_max_connections > 0.8
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "High database connections"
          description: "Database connections are above 80% of maximum."

      # Redis Health
      - alert: RedisConnectionLost
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "Redis connection lost"
          description: "Redis cache is not accessible."

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          service: redis
        annotations:
          summary: "High Redis memory usage"
          description: "Redis memory usage is above 80%."

      # Kafka Health
      - alert: KafkaDown
        expr: up{job="kafka"} == 0
        for: 1m
        labels:
          severity: critical
          service: kafka
        annotations:
          summary: "Kafka is down"
          description: "Kafka cluster is not accessible."

      - alert: KafkaHighConsumerLag
        expr: kafka_consumer_lag_sum > 1000
        for: 5m
        labels:
          severity: warning
          service: kafka
        annotations:
          summary: "High Kafka consumer lag"
          description: "Kafka consumer lag is {{ "{{" }} $value {{ "}}" }} messages for topic {{ "{{" }} $labels.topic {{ "}}" }}."

      # Neo4j Health
      - alert: Neo4jDown
        expr: up{job="neo4j"} == 0
        for: 1m
        labels:
          severity: critical
          service: neo4j
        annotations:
          summary: "Neo4j is down"
          description: "Neo4j database is not accessible."

      - alert: Neo4jHighMemoryUsage
        expr: neo4j_memory_heap_used_bytes / neo4j_memory_heap_max_bytes > 0.8
        for: 5m
        labels:
          severity: warning
          service: neo4j
        annotations:
          summary: "High Neo4j memory usage"
          description: "Neo4j heap memory usage is above 80%."

      # Mutation Analysis Alerts
      - alert: DangerousMutationDetected
        expr: mutation_alerts_total{severity="critical"} > 0
        for: 0m
        labels:
          severity: critical
          service: mutation-analysis
        annotations:
          summary: "Dangerous mutation detected"
          description: "Critical mutation detected: {{ "{{" }} $labels.mutation {{ "}}" }} in gene {{ "{{" }} $labels.gene {{ "}}" }}."

      - alert: HighMutationProcessingLatency
        expr: histogram_quantile(0.95, rate(mutation_processing_duration_seconds_bucket[5m])) > 30
        for: 5m
        labels:
          severity: warning
          service: mutation-analysis
        annotations:
          summary: "High mutation processing latency"
          description: "95th percentile mutation processing time is {{ "{{" }} $value {{ "}}" }} seconds."

      - alert: MutationProcessingErrors
        expr: rate(mutation_processing_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: mutation-analysis
        annotations:
          summary: "High mutation processing error rate"
          description: "Mutation processing error rate is {{ "{{" }} $value {{ "}}" }} errors per second."

      # Resource Usage Alerts
      - alert: HighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * container_spec_cpu_period) > 0.8
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for pod {{ "{{" }} $labels.pod {{ "}}" }}."

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.8
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 80% for pod {{ "{{" }} $labels.pod {{ "}}" }}."

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
          service: infrastructure
        annotations:
          summary: "Pod crash looping"
          description: "Pod {{ "{{" }} $labels.pod {{ "}}" }} is crash looping."

      # Workflow Alerts
      - alert: WorkflowFailed
        expr: argo_workflows_workflow_status{phase="Failed"} > 0
        for: 0m
        labels:
          severity: warning
          service: workflows
        annotations:
          summary: "Workflow failed"
          description: "Workflow {{ "{{" }} $labels.name {{ "}}" }} has failed."

      - alert: WorkflowRunningTooLong
        expr: time() - argo_workflows_workflow_start_time > 3600
        for: 0m
        labels:
          severity: warning
          service: workflows
        annotations:
          summary: "Workflow running too long"
          description: "Workflow {{ "{{" }} $labels.name {{ "}}" }} has been running for more than 1 hour."

    - name: security-alerts
      rules:
      - alert: UnauthorizedAccessAttempt
        expr: rate(http_requests_total{status="401"}[5m]) > 0.1
        for: 1m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "Unauthorized access attempts detected"
          description: "High rate of 401 responses: {{ "{{" }} $value {{ "}}" }} per second."

      - alert: SuspiciousActivity
        expr: rate(http_requests_total{status="403"}[5m]) > 0.05
        for: 1m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "Suspicious activity detected"
          description: "High rate of 403 responses: {{ "{{" }} $value {{ "}}" }} per second."

      - alert: CertificateExpiringSoon
        expr: (ssl_certificate_expiry_timestamp - time()) / 86400 < 30
        for: 0m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "SSL certificate expiring soon"
          description: "SSL certificate for {{ "{{" }} $labels.instance {{ "}}" }} expires in {{ "{{" }} $value {{ "}}" }} days."
{{- end }}
