---
# Certificate monitoring
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-cert-monitor
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
    component: cert-monitor
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 6 }}
      component: cert-monitor
  template:
    metadata:
      labels:
        {{- include "cancer-genomics-analysis-suite.selectorLabels" . | nindent 8 }}
        component: cert-monitor
    spec:
      serviceAccountName: {{ include "cancer-genomics-analysis-suite.serviceAccountName" . }}
      containers:
        - name: cert-monitor
          image: "bitnami/kubectl:latest"
          command:
            - /bin/bash
            - -c
            - |
              while true; do
                echo "Checking certificate expiration..."
                
                # Check web certificate
                kubectl get certificate {{ include "cancer-genomics-analysis-suite.fullname" . }}-web-tls -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep -q "True" || echo "Web certificate not ready"
                
                # Check API certificate
                kubectl get certificate {{ include "cancer-genomics-analysis-suite.fullname" . }}-api-tls -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep -q "True" || echo "API certificate not ready"
                
                # Check internal certificates
                kubectl get certificate {{ include "cancer-genomics-analysis-suite.fullname" . }}-internal-tls -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' | grep -q "True" || echo "Internal certificate not ready"
                
                # Send alert if certificates are expiring soon
                for cert in $(kubectl get certificates -l app.kubernetes.io/name={{ include "cancer-genomics-analysis-suite.name" . }} -o name); do
                  expiry=$(kubectl get $cert -o jsonpath='{.status.notAfter}')
                  if [ ! -z "$expiry" ]; then
                    expiry_date=$(date -d "$expiry" +%s)
                    current_date=$(date +%s)
                    days_until_expiry=$(( (expiry_date - current_date) / 86400 ))
                    
                    if [ $days_until_expiry -lt 30 ]; then
                      echo "WARNING: Certificate $cert expires in $days_until_expiry days"
                      # Send webhook notification if configured
                      if [ ! -z "{{ .Values.certificates.monitoring.webhookUrl }}" ]; then
                        curl -X POST "{{ .Values.certificates.monitoring.webhookUrl }}" \
                          -H "Content-Type: application/json" \
                          -d "{\"text\":\"Certificate $cert expires in $days_until_expiry days\"}"
                      fi
                    fi
                  fi
                done
                
                sleep 3600  # Check every hour
              done
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
{{- end }}
