---
# Redis Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-redis-tls
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-redis-tls
  issuerRef:
    name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-ca-issuer
    kind: ClusterIssuer
