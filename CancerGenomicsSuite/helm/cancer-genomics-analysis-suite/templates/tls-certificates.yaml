{{- if .Values.ingress.enabled }}
# ClusterIssuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: {{ .Values.certificates.letsencrypt.email }}
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className }}
---
# ClusterIssuer for Let's Encrypt Staging
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: {{ .Values.certificates.letsencrypt.email }}
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: {{ .Values.ingress.className }}
---
# Self-signed CA for internal certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-ca
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
# CA Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-ca
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-ca-tls
  issuerRef:
    name: selfsigned-ca
    kind: ClusterIssuer
  commonName: "Cancer Genomics CA"
  isCA: true
  duration: 87600h  # 10 years
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 4096
---
# CA Issuer for internal certificates
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-ca-issuer
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-ca-tls
---
# Web Application Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-web-tls
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-web-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.global.domain }}
    - www.{{ .Values.global.domain }}
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
---
# API Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-api-tls
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-api-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.global.apiDomain }}
    - api.{{ .Values.global.domain }}
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
---
# Admin Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-admin-tls
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-admin-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - admin.{{ .Values.global.domain }}
  duration: 2160h  # 90 days
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
---
# Internal Service Certificates
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-internal-tls
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-internal-tls
  issuerRef:
    name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-web
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-celery-worker
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-postgresql
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-redis-master
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-kafka
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-neo4j
  duration: 8760h  # 1 year
  renewBefore: 720h  # 30 days
  privateKey:
    algorithm: RSA
    size: 2048
---
# Kafka Certificate
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-kafka-tls
  labels:
    {{- include "cancer-genomics-analysis-suite.labels" . | nindent 4 }}
spec:
  secretName: {{ include "cancer-genomics-analysis-suite.fullname" . }}-kafka-tls
  issuerRef:
    name: {{ include "cancer-genomics-analysis-suite.fullname" . }}-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-kafka
    - {{ include "cancer-genomics-analysis-suite.fullname" . }}-kafka.{{ .Release.Namespace }}.svc.cluster.local
  duration: 8760h  # 1 year
  renewBefore: 720h  # 30 days
