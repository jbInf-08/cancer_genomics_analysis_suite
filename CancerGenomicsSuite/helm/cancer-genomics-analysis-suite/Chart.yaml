apiVersion: v2
name: cancer-genomics-analysis-suite
description: A comprehensive cancer genomics analysis suite with BLAST, annotation, ML, and reporting capabilities
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://github.com/your-org/cancer-genomics-analysis-suite
sources:
  - https://github.com/your-org/cancer-genomics-analysis-suite
maintainers:
  - name: Cancer Genomics Team
    email: support@cancer-genomics.com
keywords:
  - genomics
  - cancer
  - bioinformatics
  - blast
  - annotation
  - machine-learning
  - reporting
annotations:
  category: Science
  licenses: MIT
dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nginx-ingress
    version: "4.x.x"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress.enabled
  - name: cert-manager
    version: "v1.13.0"
    repository: "https://charts.jetstack.io"
    condition: ingress.enabled
  - name: prometheus
    version: "25.x.x"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.enabled
  - name: grafana
    version: "7.x.x"
    repository: "https://grafana.github.io/helm-charts"
    condition: monitoring.grafana.enabled
