---
# ArgoCD Application for Prometheus
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cancer-genomics-prometheus
  namespace: argocd
  labels:
    app: cancer-genomics-prometheus
    environment: production
    component: monitoring
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cancer-genomics-project
  
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 55.5.0
    helm:
      values: |
        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: fast-ssd
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 100Gi
            resources:
              requests:
                memory: "2Gi"
                cpu: "1000m"
              limits:
                memory: "4Gi"
                cpu: "2000m"
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            additionalScrapeConfigs:
              - job_name: 'cancer-genomics-app'
                static_configs:
                  - targets: ['cancer-genomics-app:8080']
                metrics_path: '/metrics'
                scrape_interval: 30s
        
        grafana:
          enabled: true
          adminPassword: "admin"
          persistence:
            enabled: true
            storageClassName: fast-ssd
            size: 10Gi
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          grafana.ini:
            server:
              root_url: https://grafana.cancer-genomics.yourdomain.com
            security:
              admin_user: admin
              admin_password: admin
            auth.anonymous:
              enabled: false
            auth.oauth_auto_login: true
            auth.generic_oauth:
              enabled: true
              name: "Keycloak"
              client_id: grafana
              client_secret: grafana-secret
              scopes: "openid profile email"
              auth_url: https://keycloak.cancer-genomics.yourdomain.com/realms/cancer-genomics/protocol/openid-connect/auth
              token_url: https://keycloak.cancer-genomics.yourdomain.com/realms/cancer-genomics/protocol/openid-connect/token
              api_url: https://keycloak.cancer-genomics.yourdomain.com/realms/cancer-genomics/protocol/openid-connect/userinfo
              role_attribute_path: contains(groups[*], 'grafana-admin') && 'Admin' || contains(groups[*], 'grafana-editor') && 'Editor' || 'Viewer'
        
        alertmanager:
          enabled: true
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: fast-ssd
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 10Gi
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
---
# ArgoCD Application for ELK Stack
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cancer-genomics-elk
  namespace: argocd
  labels:
    app: cancer-genomics-elk
    environment: production
    component: logging
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cancer-genomics-project
  
  source:
    repoURL: https://helm.elastic.co
    chart: elasticsearch
    targetRevision: 8.5.1
    helm:
      values: |
        replicas: 3
        minimumMasterNodes: 2
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        volumeClaimTemplate:
          accessModes: ["ReadWriteOnce"]
          storageClassName: fast-ssd
          resources:
            requests:
              storage: 50Gi
        esJavaOpts: "-Xmx2g -Xms2g"
        esConfig:
          elasticsearch.yml: |
            xpack.security.enabled: false
            xpack.monitoring.collection.enabled: true
            cluster.name: "cancer-genomics"
            node.name: "${HOSTNAME}"
            network.host: 0.0.0.0
            discovery.seed_hosts: "elasticsearch-master-headless"
            cluster.initial_master_nodes: "elasticsearch-master-0,elasticsearch-master-1,elasticsearch-master-2"
  
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  revisionHistoryLimit: 10
