name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'CancerGenomicsSuite/**'
      - 'helm/**'
      - 'argocd/**'
      - 'terraform/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'CancerGenomicsSuite/**'
      - 'helm/**'
      - 'argocd/**'
      - 'terraform/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Security and Quality Checks
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r CancerGenomicsSuite -ll -ii -f json -o bandit-results.json || true
      
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  # Code Quality and Linting
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r CancerGenomicsSuite/requirements.txt
          pip install black flake8 mypy pytest pytest-cov bandit safety
      
      - name: Run Black formatter check
        run: black --check --diff CancerGenomicsSuite/
      
      - name: Run Flake8 linter
        run: flake8 CancerGenomicsSuite/ --max-line-length=88 --extend-ignore=E203,W503
      
      - name: Run MyPy type checker
        run: mypy CancerGenomicsSuite/ --ignore-missing-imports
      
      - name: Run Safety check
        run: safety check --json --output safety-report.json
      
      - name: Upload safety report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: safety-report
          path: safety-report.json

  # Unit and Integration Tests
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [security-scan, code-quality]
    if: ${{ !inputs.skip_tests }}
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r CancerGenomicsSuite/requirements.txt
          pip install pytest pytest-cov pytest-mock
      
      - name: Run unit tests
        run: |
          cd CancerGenomicsSuite
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0
          FLASK_ENV: testing
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./CancerGenomicsSuite/coverage.xml
          flags: unittests
          name: codecov-umbrella
      
      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: CancerGenomicsSuite/htmlcov/

  # Build and Push Docker Images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - context: CancerGenomicsSuite
            dockerfile: CancerGenomicsSuite/Dockerfile
            target: web
          - context: CancerGenomicsSuite
            dockerfile: CancerGenomicsSuite/Dockerfile
            target: celery-worker
          - context: CancerGenomicsSuite
            dockerfile: CancerGenomicsSuite/Dockerfile
            target: kafka-processor
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Helm Chart Testing
  helm-test:
    name: Helm Chart Test
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.12.0'
      
      - name: Install Helm plugins
        run: |
          helm plugin install https://github.com/helm/helm-unittest
          helm plugin install https://github.com/helm/helm-docs
      
      - name: Run Helm lint
        run: |
          helm lint helm/cancer-genomics-analysis-suite/
      
      - name: Run Helm unittest
        run: |
          helm unittest helm/cancer-genomics-analysis-suite/
      
      - name: Generate Helm docs
        run: |
          helm-docs helm/cancer-genomics-analysis-suite/
      
      - name: Package Helm chart
        run: |
          helm package helm/cancer-genomics-analysis-suite/
      
      - name: Upload Helm package
        uses: actions/upload-artifact@v3
        with:
          name: helm-chart
          path: cancer-genomics-analysis-suite-*.tgz

  # Terraform Validation
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        provider: [aws, gcp]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'
      
      - name: Terraform Format Check
        run: terraform fmt -check -recursive terraform/${{ matrix.provider }}/
      
      - name: Terraform Init
        run: |
          cd terraform/${{ matrix.provider }}
          terraform init -backend=false
      
      - name: Terraform Validate
        run: |
          cd terraform/${{ matrix.provider }}
          terraform validate
      
      - name: Terraform Plan
        run: |
          cd terraform/${{ matrix.provider }}
          terraform plan -var-file="terraform.tfvars.example" -out=tfplan
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}

  # Deploy to Development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [build, helm-test, terraform-validate]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    environment: development
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name cancer-genomics-dev-eks
      
      - name: Deploy to development
        run: |
          helm upgrade --install cancer-genomics-dev \
            helm/cancer-genomics-analysis-suite/ \
            --namespace cancer-genomics-dev \
            --create-namespace \
            --values helm/cancer-genomics-analysis-suite/values-dev.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=10m
      
      - name: Run smoke tests
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=cancer-genomics-analysis-suite -n cancer-genomics-dev --timeout=300s
          kubectl get pods -n cancer-genomics-dev
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Deployment to development environment completed'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [deploy-dev]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging')
    environment: staging
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name cancer-genomics-staging-eks
      
      - name: Deploy to staging
        run: |
          helm upgrade --install cancer-genomics-staging \
            helm/cancer-genomics-analysis-suite/ \
            --namespace cancer-genomics-staging \
            --create-namespace \
            --values helm/cancer-genomics-analysis-suite/values-staging.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=15m
      
      - name: Run integration tests
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=cancer-genomics-analysis-suite -n cancer-genomics-staging --timeout=300s
          kubectl get pods -n cancer-genomics-staging
      
      - name: Run performance tests
        run: |
          # Add performance test commands here
          echo "Running performance tests..."
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Deployment to staging environment completed'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
    environment: production
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name cancer-genomics-prod-eks
      
      - name: Create backup before deployment
        run: |
          kubectl create job backup-before-deployment-$(date +%Y%m%d-%H%M%S) \
            --from=cronjob/backup-cronjob \
            -n cancer-genomics-prod
      
      - name: Deploy to production
        run: |
          helm upgrade --install cancer-genomics-prod \
            helm/cancer-genomics-analysis-suite/ \
            --namespace cancer-genomics-prod \
            --create-namespace \
            --values helm/cancer-genomics-analysis-suite/values-production.yaml \
            --set image.tag=${{ github.sha }} \
            --wait --timeout=20m
      
      - name: Run health checks
        run: |
          kubectl wait --for=condition=ready pod -l app.kubernetes.io/name=cancer-genomics-analysis-suite -n cancer-genomics-prod --timeout=300s
          kubectl get pods -n cancer-genomics-prod
      
      - name: Run post-deployment tests
        run: |
          # Add post-deployment test commands here
          echo "Running post-deployment tests..."
      
      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        if: always()
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: 'Deployment to production environment completed'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
      - name: Clean up old images
        run: |
          echo "Cleaning up old Docker images..."
          # Add cleanup logic here
      
      - name: Clean up old artifacts
        run: |
          echo "Cleaning up old artifacts..."
          # Add cleanup logic here
