name: Cancer Genomics Analysis Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'data/**'
      - 'workflows/**'
      - 'modules/**'
      - 'scripts/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'data/**'
      - 'workflows/**'
      - 'modules/**'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      workflow_type:
        description: 'Workflow type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - blast-only
          - ml-only
          - report-only
      sample_list:
        description: 'Comma-separated list of samples to process'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Security and quality checks
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Bandit security linter
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-results.json || true

      - name: Upload Bandit results
        uses: actions/upload-artifact@v3
        with:
          name: bandit-results
          path: bandit-results.json

  # Code quality and testing
  quality-checks:
    name: Quality Checks
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8 black isort mypy

      - name: Run code formatting check
        run: |
          black --check .
          isort --check-only .

      - name: Run linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run type checking
        run: |
          mypy . --ignore-missing-imports || true

      - name: Run tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # Build and push Docker images
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [security-scan, quality-checks]
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/develop' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to staging
        run: |
          export KUBECONFIG=kubeconfig
          
          # Update Helm repository
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          
          # Deploy the application
          helm upgrade --install cancer-genomics-staging ./helm/cancer-genomics-analysis-suite \
            --namespace cancer-genomics-staging \
            --create-namespace \
            --values ./helm/cancer-genomics-analysis-suite/values-staging.yaml \
            --set image.tag=${{ needs.build-images.outputs.image-tag }} \
            --set global.environment=staging \
            --wait --timeout=10m

      - name: Run smoke tests
        run: |
          export KUBECONFIG=kubeconfig
          
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=cancer-genomics-analysis-suite -n cancer-genomics-staging --timeout=300s
          
          # Run basic health checks
          kubectl get pods -n cancer-genomics-staging
          kubectl get services -n cancer-genomics-staging

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to production
        run: |
          export KUBECONFIG=kubeconfig
          
          # Update Helm repository
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          
          # Deploy the application
          helm upgrade --install cancer-genomics-prod ./helm/cancer-genomics-analysis-suite \
            --namespace cancer-genomics-prod \
            --create-namespace \
            --values ./helm/cancer-genomics-analysis-suite/values-production.yaml \
            --set image.tag=${{ needs.build-images.outputs.image-tag }} \
            --set global.environment=production \
            --wait --timeout=15m

      - name: Run production health checks
        run: |
          export KUBECONFIG=kubeconfig
          
          # Wait for pods to be ready
          kubectl wait --for=condition=ready pod -l app=cancer-genomics-analysis-suite -n cancer-genomics-prod --timeout=600s
          
          # Run comprehensive health checks
          kubectl get pods -n cancer-genomics-prod
          kubectl get services -n cancer-genomics-prod
          kubectl get ingress -n cancer-genomics-prod

  # Trigger Argo Workflows
  trigger-argo-workflows:
    name: Trigger Argo Workflows
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
            NAMESPACE="cancer-genomics-staging"
          else
            echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
            NAMESPACE="cancer-genomics-prod"
          fi
          export KUBECONFIG=kubeconfig

      - name: Submit Argo Workflow
        run: |
          export KUBECONFIG=kubeconfig
          
          # Determine workflow type
          WORKFLOW_TYPE="${{ github.event.inputs.workflow_type || 'full' }}"
          
          # Create workflow parameters
          WORKFLOW_PARAMS=$(cat <<EOF
          {
            "workflow_type": "${WORKFLOW_TYPE}",
            "sample_list": "${{ github.event.inputs.sample_list || '' }}",
            "image_tag": "${{ needs.build-images.outputs.image-tag }}",
            "environment": "${{ github.ref == 'refs/heads/develop' && 'staging' || 'production' }}",
            "git_commit": "${{ github.sha }}",
            "git_branch": "${{ github.ref_name }}"
          }
          EOF
          )
          
          # Submit workflow to Argo
          argo submit ./workflows/argo/cancer-genomics-workflow.yaml \
            --namespace ${NAMESPACE} \
            --parameter workflow-params="${WORKFLOW_PARAMS}" \
            --wait

      - name: Monitor workflow execution
        run: |
          export KUBECONFIG=kubeconfig
          
          # Get workflow status
          argo list --namespace ${NAMESPACE}
          
          # Wait for workflow completion
          argo wait --namespace ${NAMESPACE} --timeout 3600

  # Run integration tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [trigger-argo-workflows]
    if: always() && needs.trigger-argo-workflows.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest requests

      - name: Run integration tests
        run: |
          # Determine environment
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            BASE_URL="https://staging.cancer-genomics.yourdomain.com"
          else
            BASE_URL="https://cancer-genomics.yourdomain.com"
          fi
          
          # Run API tests
          pytest tests/integration/ -v --base-url=${BASE_URL}

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: integration-test-results
          path: test-results/

  # Performance testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [integration-tests]
    if: always() && needs.integration-tests.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust

      - name: Run performance tests
        run: |
          # Determine environment
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            BASE_URL="https://staging.cancer-genomics.yourdomain.com"
          else
            BASE_URL="https://cancer-genomics.yourdomain.com"
          fi
          
          # Run Locust performance tests
          locust -f tests/performance/locustfile.py \
            --host=${BASE_URL} \
            --users=100 \
            --spawn-rate=10 \
            --run-time=5m \
            --headless \
            --html=performance-report.html

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: performance-test-results
          path: performance-report.html

  # Notification
  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production, trigger-argo-workflows, integration-tests, performance-tests]
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#cancer-genomics'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

      - name: Send email notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: 'Cancer Genomics Pipeline Failed - ${{ github.ref_name }}'
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            The Cancer Genomics pipeline has failed.
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}
            
            Please check the logs for more details.

  # Cleanup
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [notify]
    if: always()
    steps:
      - name: Cleanup old artifacts
        uses: actions/github-script@v6
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId
            });
            
            // Keep only the latest 10 artifacts
            const artifactsToDelete = artifacts.data.artifacts.slice(10);
            
            for (const artifact of artifactsToDelete) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
            }
