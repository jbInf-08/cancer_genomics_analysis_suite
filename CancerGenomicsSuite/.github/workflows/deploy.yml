name: Deploy Cancer Genomics Analysis Suite

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.9, 3.10, 3.11]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r CancerGenomicsSuite/requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 CancerGenomicsSuite/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 CancerGenomicsSuite/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        cd CancerGenomicsSuite
        pytest tests/ --cov=. --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./CancerGenomicsSuite/coverage.xml
        flags: unittests
        name: codecov-umbrella

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./CancerGenomicsSuite
        file: ./CancerGenomicsSuite/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  deploy-dev:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: development
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_DEV }}
    
    - name: Deploy to development
      run: |
        helm upgrade --install cancer-genomics-dev ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite \
          --namespace cancer-genomics-dev \
          --create-namespace \
          --set global.cloudProvider=aws \
          --set global.region=us-west-2 \
          --set global.aws.eksClusterName=${{ secrets.EKS_CLUSTER_NAME_DEV }} \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=develop \
          --set web.replicaCount=1 \
          --set celery.worker.replicaCount=1 \
          --set postgresql.enabled=true \
          --set redis.enabled=true \
          --set ingress.enabled=true \
          --set ingress.hosts[0].host=cancer-genomics-dev.yourdomain.com \
          --values ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite/values-dev.yaml

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}
    
    - name: Deploy to staging
      run: |
        helm upgrade --install cancer-genomics-staging ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite \
          --namespace cancer-genomics-staging \
          --create-namespace \
          --set global.cloudProvider=aws \
          --set global.region=us-west-2 \
          --set global.aws.eksClusterName=${{ secrets.EKS_CLUSTER_NAME_STAGING }} \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=main \
          --set web.replicaCount=2 \
          --set celery.worker.replicaCount=2 \
          --set postgresql.enabled=true \
          --set redis.enabled=true \
          --set ingress.enabled=true \
          --set ingress.hosts[0].host=cancer-genomics-staging.yourdomain.com \
          --values ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite/values-staging.yaml

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'
    
    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_PROD }}
    
    - name: Deploy to production
      run: |
        helm upgrade --install cancer-genomics-prod ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite \
          --namespace cancer-genomics-prod \
          --create-namespace \
          --set global.cloudProvider=aws \
          --set global.region=us-west-2 \
          --set global.aws.eksClusterName=${{ secrets.EKS_CLUSTER_NAME_PROD }} \
          --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
          --set image.tag=${{ github.ref_name }} \
          --set web.replicaCount=3 \
          --set celery.worker.replicaCount=3 \
          --set postgresql.enabled=false \
          --set global.aws.rdsInstance=${{ secrets.RDS_INSTANCE_PROD }} \
          --set redis.enabled=false \
          --set global.aws.elasticacheCluster=${{ secrets.ELASTICACHE_CLUSTER_PROD }} \
          --set ingress.enabled=true \
          --set ingress.hosts[0].host=cancer-genomics.yourdomain.com \
          --values ./CancerGenomicsSuite/helm/cancer-genomics-analysis-suite/values-prod.yaml

  security-scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  notify:
    needs: [deploy-dev, deploy-staging, deploy-production]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Notify deployment status
      if: always()
      uses: 8398a7/action-slack@v3
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
      with:
        status: ${{ job.status }}
        channel: '#deployments'
