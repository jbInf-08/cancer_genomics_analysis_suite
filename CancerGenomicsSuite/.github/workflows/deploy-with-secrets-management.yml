            --set argoWorkflows.config.artifactRepository.s3.endpoint=${{ secrets.ARTIFACT_REPOSITORY_ENDPOINT }} \
            --set argoWorkflows.config.artifactRepository.s3.accessKeySecret.name=${{ secrets.ARTIFACT_REPOSITORY_ACCESS_KEY_SECRET }} \
            --set argoWorkflows.config.artifactRepository.s3.accessKeySecret.key=${{ secrets.ARTIFACT_REPOSITORY_ACCESS_KEY_KEY }} \
            --set argoWorkflows.config.artifactRepository.s3.secretKeySecret.name=${{ secrets.ARTIFACT_REPOSITORY_SECRET_KEY_SECRET }} \
            --set argoWorkflows.config.artifactRepository.s3.secretKeySecret.key=${{ secrets.ARTIFACT_REPOSITORY_SECRET_KEY_KEY }} \
            --set argoWorkflows.monitoring.enabled=true \
            --set argoWorkflows.monitoring.prometheus.enabled=true \
            --set argoWorkflows.monitoring.prometheus.serviceMonitor.enabled=true \
            --set argoWorkflows.monitoring.grafana.enabled=true \
            --set argoWorkflows.monitoring.grafana.dashboard.enabled=true \
            --set argoWorkflows.cronWorkflows.enabled=true \
            --set argoWorkflows.cronWorkflows.schedules[0].name="daily-blast-analysis" \
            --set argoWorkflows.cronWorkflows.schedules[0].schedule="0 2 * * *" \
            --set argoWorkflows.cronWorkflows.schedules[0].workflowTemplate="blast-pipeline" \
            --set argoWorkflows.cronWorkflows.schedules[1].name="weekly-ml-training" \
            --set argoWorkflows.cronWorkflows.schedules[1].schedule="0 3 * * 0" \
            --set argoWorkflows.cronWorkflows.schedules[1].workflowTemplate="ml-pipeline" \
            --set argoWorkflows.templates.blastPipeline.enabled=true \
            --set argoWorkflows.templates.blastPipeline.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image-tag }} \
            --set argoWorkflows.templates.annotationPipeline.enabled=true \
            --set argoWorkflows.templates.annotationPipeline.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image-tag }} \
            --set argoWorkflows.templates.mlPipeline.enabled=true \
            --set argoWorkflows.templates.mlPipeline.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image-tag }} \
            --set argoWorkflows.templates.reportingPipeline.enabled=true \
            --set argoWorkflows.templates.reportingPipeline.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image-tag }} \
            --set cicd.enabled=true \
            --set cicd.github.enabled=true \
            --set cicd.github.repository=${{ github.repository }} \
            --set cicd.github.branch=main \
            --set cicd.deployment.strategy=rolling \
            --set cicd.deployment.environments[0].name=production \
            --set cicd.deployment.environments[0].namespace=cancer-genomics-prod \
            --set cicd.deployment.environments[0].replicas=3 \
            --set cicd.deployment.environments[0].resources.limits.cpu=2000m \
            --set cicd.deployment.environments[0].resources.limits.memory=4Gi \
            --set cicd.deployment.environments[0].resources.requests.cpu=500m \
            --set cicd.deployment.environments[0].resources.requests.memory=1Gi \
            --wait \
            --timeout=15m

      - name: Wait for deployment to be ready
        run: |
          kubectl wait --for=condition=available --timeout=600s deployment/cancer-genomics-prod-web -n cancer-genomics-prod
          kubectl wait --for=condition=available --timeout=600s deployment/cancer-genomics-prod-celery-worker -n cancer-genomics-prod
          kubectl wait --for=condition=available --timeout=600s deployment/cancer-genomics-prod-celery-beat -n cancer-genomics-prod

      - name: Run health checks
        run: |
          # Get the service URL
          SERVICE_URL=$(kubectl get service cancer-genomics-prod-web -n cancer-genomics-prod -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          if [ -z "$SERVICE_URL" ]; then
            SERVICE_URL=$(kubectl get service cancer-genomics-prod-web -n cancer-genomics-prod -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          fi
          
          # Wait for service to be ready
          sleep 60
          
          # Run health check
          curl -f "https://$SERVICE_URL/health" || exit 1
          
          # Run API health check
          curl -f "https://$SERVICE_URL/api/health" || exit 1

      - name: Deploy monitoring rules
        run: |
          kubectl apply -f ${{ env.HELM_CHART_PATH }}/grafana-alerting-rules.yaml

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment completed successfully!"
          echo "🌐 Application URL: https://${{ secrets.DOMAIN_PRODUCTION }}"
          echo "📊 Monitoring: https://grafana.cancer-genomics.local"
          echo "🔐 Vault: ${{ secrets.VAULT_ADDR_PRODUCTION }}"

  # Post-deployment validation
  post-deployment-validation:
    name: Post-Deployment Validation
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        run: |
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
            kubectl config set-context --current --namespace=cancer-genomics-staging
            ENVIRONMENT="staging"
            DOMAIN="${{ secrets.DOMAIN_STAGING }}"
          elif [ "${{ needs.deploy-production.result }}" == "success" ]; then
            echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > ~/.kube/config
            kubectl config set-context --current --namespace=cancer-genomics-prod
            ENVIRONMENT="production"
            DOMAIN="${{ secrets.DOMAIN_PRODUCTION }}"
          fi

      - name: Run comprehensive health checks
        run: |
          # Check pod status
          kubectl get pods -o wide
          
          # Check service status
          kubectl get services
          
          # Check ingress status
          kubectl get ingress
          
          # Check persistent volumes
          kubectl get pv,pvc
          
          # Check secrets
          kubectl get secrets
          
          # Check configmaps
          kubectl get configmaps
          
          # Check network policies
          kubectl get networkpolicies
          
          # Check pod disruption budgets
          kubectl get poddisruptionbudgets
          
          # Check horizontal pod autoscalers
          kubectl get hpa
          
          # Check cron jobs
          kubectl get cronjobs
          
          # Check jobs
          kubectl get jobs
          
          # Check workflows
          kubectl get workflows
          
          # Check cron workflows
          kubectl get cronworkflows

      - name: Run integration tests
        run: |
          # Test database connectivity
          kubectl run db-test --image=postgres:15 --rm -i --restart=Never -- psql -h postgresql -U postgres -d genomics_db -c "SELECT 1;"
          
          # Test Redis connectivity
          kubectl run redis-test --image=redis:7 --rm -i --restart=Never -- redis-cli -h redis-master ping
          
          # Test Neo4j connectivity
          kubectl run neo4j-test --image=neo4j:5.15 --rm -i --restart=Never -- cypher-shell -u neo4j -p neo4j-password -a neo4j "RETURN 1;"
          
          # Test Kafka connectivity
          kubectl run kafka-test --image=confluentinc/cp-kafka:7.4.0 --rm -i --restart=Never -- kafka-topics --bootstrap-server kafka:9092 --list

      - name: Run performance tests
        run: |
          # Test API performance
          kubectl run api-test --image=curlimages/curl:latest --rm -i --restart=Never -- curl -w "@-" -o /dev/null -s "https://$DOMAIN/api/health" <<< "time_namelookup:  %{time_namelookup}\ntime_connect:     %{time_connect}\ntime_appconnect:  %{time_appconnect}\ntime_pretransfer: %{time_pretransfer}\ntime_redirect:    %{time_redirect}\ntime_starttransfer: %{time_starttransfer}\ntime_total:       %{time_total}\n"

      - name: Check monitoring
        run: |
          # Check Prometheus targets
          kubectl get servicemonitors
          
          # Check Prometheus rules
          kubectl get prometheusrules
          
          # Check Grafana dashboards
          kubectl get grafana-dashboards

      - name: Check security
        run: |
          # Check RBAC
          kubectl get roles,rolebindings,clusterroles,clusterrolebindings
          
          # Check security contexts
          kubectl get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.securityContext}{"\n"}{end}'
          
          # Check network policies
          kubectl get networkpolicies -o yaml

      - name: Generate deployment report
        run: |
          echo "# Deployment Report" > deployment-report.md
          echo "## Environment: $ENVIRONMENT" >> deployment-report.md
          echo "## Timestamp: $(date)" >> deployment-report.md
          echo "## Git Commit: ${{ github.sha }}" >> deployment-report.md
          echo "## Git Branch: ${{ github.ref_name }}" >> deployment-report.md
          echo "## Image Tag: ${{ needs.build-and-test.outputs.image-tag }}" >> deployment-report.md
          echo "## Image Digest: ${{ needs.build-and-test.outputs.image-digest }}" >> deployment-report.md
          echo "## Secrets Strategy: ${{ github.event.inputs.secrets_strategy }}" >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Pod Status" >> deployment-report.md
          kubectl get pods -o wide >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Service Status" >> deployment-report.md
          kubectl get services >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Ingress Status" >> deployment-report.md
          kubectl get ingress >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Persistent Volumes" >> deployment-report.md
          kubectl get pv,pvc >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Secrets" >> deployment-report.md
          kubectl get secrets >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## ConfigMaps" >> deployment-report.md
          kubectl get configmaps >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Network Policies" >> deployment-report.md
          kubectl get networkpolicies >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Pod Disruption Budgets" >> deployment-report.md
          kubectl get poddisruptionbudgets >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Horizontal Pod Autoscalers" >> deployment-report.md
          kubectl get hpa >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Cron Jobs" >> deployment-report.md
          kubectl get cronjobs >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Jobs" >> deployment-report.md
          kubectl get jobs >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Workflows" >> deployment-report.md
          kubectl get workflows >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Cron Workflows" >> deployment-report.md
          kubectl get cronworkflows >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Service Monitors" >> deployment-report.md
          kubectl get servicemonitors >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Prometheus Rules" >> deployment-report.md
          kubectl get prometheusrules >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Grafana Dashboards" >> deployment-report.md
          kubectl get grafana-dashboards >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## RBAC" >> deployment-report.md
          kubectl get roles,rolebindings,clusterroles,clusterrolebindings >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Security Contexts" >> deployment-report.md
          kubectl get pods -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.securityContext}{"\n"}{end}' >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## Network Policies Details" >> deployment-report.md
          kubectl get networkpolicies -o yaml >> deployment-report.md
          echo "" >> deployment-report.md
          echo "## End of Report" >> deployment-report.md

      - name: Upload deployment report
        uses: actions/upload-artifact@v3
        with:
          name: deployment-report-$ENVIRONMENT
          path: deployment-report.md

      - name: Notify validation completion
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Post-deployment validation completed successfully!"
            echo "📊 Deployment report generated and uploaded"
            echo "🔍 All health checks passed"
            echo "🛡️ Security checks completed"
            echo "📈 Performance tests completed"
            echo "🔧 Monitoring setup verified"
          else
            echo "❌ Post-deployment validation failed!"
            echo "📊 Deployment report generated and uploaded"
            echo "🔍 Some health checks failed"
            echo "🛡️ Security checks completed"
            echo "📈 Performance tests completed"
            echo "🔧 Monitoring setup verified"
          fi
