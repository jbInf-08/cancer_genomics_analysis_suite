            --set argoWorkflows.templates.reportingPipeline.enabled=true \
            --set argoWorkflows.templates.reportingPipeline.image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image-tag }} \
            --set cicd.enabled=true \
            --set cicd.github.enabled=true \
            --set cicd.github.repository=${{ github.repository }} \
            --set cicd.github.branch=develop \
            --set cicd.deployment.strategy=rolling \
            --set cicd.deployment.environments[0].name=staging \
            --set cicd.deployment.environments[0].namespace=cancer-genomics-staging \
            --set cicd.deployment.environments[0].replicas=2 \
            --set cicd.deployment.environments[0].resources.limits.cpu=1000m \
            --set cicd.deployment.environments[0].resources.limits.memory=2Gi \
            --set cicd.deployment.environments[0].resources.requests.cpu=250m \
            --set cicd.deployment.environments[0].resources.requests.memory=512Mi \
            --wait \
            --timeout=10m

      - name: Deploy with SealedSecrets
        if: needs.setup-secrets.outputs.sealed-secrets-configured == 'true'
        run: |
          helm upgrade --install cancer-genomics-staging ${{ env.HELM_CHART_PATH }} \
            --namespace cancer-genomics-staging \
            --set global.secretsStrategy=sealed-secrets \
