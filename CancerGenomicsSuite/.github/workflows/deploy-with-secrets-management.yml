name: Deploy Cancer Genomics Suite with Secrets Management

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'CancerGenomicsSuite/**'
      - '.github/workflows/deploy-with-secrets-management.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'CancerGenomicsSuite/**'
      - '.github/workflows/deploy-with-secrets-management.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      secrets_strategy:
        description: 'Secrets management strategy'
        required: true
        default: 'vault'
        type: choice
        options:
          - vault
          - sealed-secrets
          - cloud-manager
          - hybrid
      force_deploy:
        description: 'Force deployment even if tests fail'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cancer-genomics-analysis-suite
  HELM_CHART_PATH: CancerGenomicsSuite/helm/cancer-genomics-analysis-suite
  VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
  VAULT_NAMESPACE: ${{ secrets.VAULT_NAMESPACE }}

jobs:
  # Security and compliance checks
  security-scan:
    name: Security and Compliance Scan
    runs-on: ubuntu-latest
    outputs:
      security-passed: ${{ steps.security-check.outputs.passed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Snyk security scan
        uses: snyk/actions/docker@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Check for secrets in code
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Security check result
        id: security-check
        run: |
          if [ -f "trivy-results.sarif" ] && [ -s "trivy-results.sarif" ]; then
            echo "Security scan completed"
            echo "passed=true" >> $GITHUB_OUTPUT
          else
            echo "Security scan failed"
            echo "passed=false" >> $GITHUB_OUTPUT
          fi

  # Build and test
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    needs: security-scan
    if: needs.security-scan.outputs.security-passed == 'true' || github.event.inputs.force_deploy == 'true'
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./CancerGenomicsSuite
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run unit tests
        run: |
          cd CancerGenomicsSuite
          python -m pytest tests/ -v --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./CancerGenomicsSuite/coverage.xml
          flags: unittests
          name: codecov-umbrella

  # Secrets management setup
  setup-secrets:
    name: Setup Secrets Management
    runs-on: ubuntu-latest
    needs: [security-scan, build-and-test]
    if: always() && (needs.security-scan.outputs.security-passed == 'true' || github.event.inputs.force_deploy == 'true')
    outputs:
      vault-configured: ${{ steps.vault-setup.outputs.configured }}
      sealed-secrets-configured: ${{ steps.sealed-secrets-setup.outputs.configured }}
      cloud-secrets-configured: ${{ steps.cloud-secrets-setup.outputs.configured }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl
        run: |
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          kubectl config set-context --current --namespace=cancer-genomics

      - name: Setup Vault
        id: vault-setup
        if: github.event.inputs.secrets_strategy == 'vault' || github.event.inputs.secrets_strategy == 'hybrid'
        run: |
          # Install Vault CLI
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
          sudo apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          sudo apt-get update && sudo apt-get install vault

          # Check Vault connectivity
          if vault status -address="$VAULT_ADDR"; then
            echo "Vault is accessible"
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "Vault is not accessible"
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup SealedSecrets
        id: sealed-secrets-setup
        if: github.event.inputs.secrets_strategy == 'sealed-secrets' || github.event.inputs.secrets_strategy == 'hybrid'
        run: |
          # Install kubeseal
          wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.24.0/kubeseal-0.24.0-linux-amd64.tar.gz
          tar xzf kubeseal-0.24.0-linux-amd64.tar.gz
          sudo install -m 755 kubeseal /usr/local/bin/kubeseal

          # Check SealedSecrets controller
          if kubectl get deployment sealed-secrets-controller -n kube-system; then
            echo "SealedSecrets controller is running"
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "SealedSecrets controller is not running"
            echo "configured=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Cloud Secret Manager
        id: cloud-secrets-setup
        if: github.event.inputs.secrets_strategy == 'cloud-manager' || github.event.inputs.secrets_strategy == 'hybrid'
        run: |
          # Setup AWS Secrets Manager
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set default.region ${{ secrets.AWS_REGION }}
            echo "AWS Secrets Manager configured"
          fi

          # Setup GCP Secret Manager
          if [ -n "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" ]; then
            echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 -d > gcp-key.json
            export GOOGLE_APPLICATION_CREDENTIALS=gcp-key.json
            echo "GCP Secret Manager configured"
          fi

          # Setup Azure Key Vault
          if [ -n "${{ secrets.AZURE_CLIENT_ID }}" ]; then
            az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ secrets.AZURE_TENANT_ID }}
            echo "Azure Key Vault configured"
          fi

          echo "configured=true" >> $GITHUB_OUTPUT

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-test, setup-secrets]
    if: github.ref == 'refs/heads/develop' || github.event.inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.0'

      - name: Configure kubectl for staging
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          kubectl config set-context --current --namespace=cancer-genomics-staging

      - name: Create namespace
        run: |
          kubectl create namespace cancer-genomics-staging --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Vault
        if: needs.setup-secrets.outputs.vault-configured == 'true'
        run: |
          helm upgrade --install cancer-genomics-staging ${{ env.HELM_CHART_PATH }} \
            --namespace cancer-genomics-staging \
            --set global.secretsStrategy=vault \
            --set global.vault.enabled=true \
            --set global.vault.address=${{ secrets.VAULT_ADDR_STAGING }} \
            --set global.vault.namespace=${{ secrets.VAULT_NAMESPACE_STAGING }} \
            --set image.tag=${{ needs.build-and-test.outputs.image-tag }} \
            --set image.digest=${{ needs.build-and-test.outputs.image-digest }} \
            --set global.cloudProvider=${{ secrets.CLOUD_PROVIDER }} \
            --set global.region=${{ secrets.REGION }} \
            --set global.domain=${{ secrets.DOMAIN_STAGING }} \
            --set global.apiDomain=${{ secrets.API_DOMAIN_STAGING }} \
            --set secretsManagement.strategy=vault \
            --set secretsManagement.vault.enabled=true \
            --set secretsManagement.vault.address=${{ secrets.VAULT_ADDR_STAGING }} \
            --set secretsManagement.vault.namespace=${{ secrets.VAULT_NAMESPACE_STAGING }} \
            --set secretsManagement.vault.authMethod=kubernetes \
            --set secretsManagement.vault.role=${{ secrets.VAULT_ROLE_STAGING }} \
            --set secretsManagement.vault.path=${{ secrets.VAULT_PATH_STAGING }} \
            --set secretsManagement.monitoring.enabled=true \
            --set secretsManagement.monitoring.alerts.enabled=true \
            --set monitoring.enabled=true \
            --set monitoring.grafana.enabled=true \
            --set monitoring.grafana.dashboard.enabled=true \
            --set monitoring.prometheusRule.enabled=true \
            --set monitoring.serviceMonitor.enabled=true \
            --set ingress.enabled=true \
            --set ingress.hosts[0].host=${{ secrets.DOMAIN_STAGING }} \
            --set ingress.tls[0].secretName=cancer-genomics-staging-tls \
            --set ingress.tls[0].hosts[0]=${{ secrets.DOMAIN_STAGING }} \
            --set web.replicaCount=2 \
            --set celery.worker.replicaCount=1 \
            --set celery.beat.replicaCount=1 \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --set neo4j.enabled=true \
            --set kafka.enabled=true \
            --set zookeeper.enabled=true \
            --set kafkaStreamProcessors.enabled=true \
            --set snakemakeWorkflows.enabled=true \
            --set nextflowWorkflows.enabled=true \
            --set argoWorkflows.enabled=true \
            --set backup.enabled=true \
            --set backup.schedule="0 2 * * *" \
            --set backup.retention="7d" \
            --set autoscaling.enabled=true \
            --set autoscaling.minReplicas=1 \
            --set autoscaling.maxReplicas=5 \
            --set autoscaling.targetCPUUtilizationPercentage=70 \
            --set autoscaling.targetMemoryUtilizationPercentage=70 \
            --set podDisruptionBudget.enabled=true \
            --set podDisruptionBudget.minAvailable=1 \
            --set networkPolicy.enabled=true \
            --set security.networkPolicy.enabled=true \
            --set security.mtls.enabled=false \
            --set security.secrets.rotation.enabled=true \
            --set security.secrets.rotation.schedule="0 2 * * *" \
            --set security.secrets.audit.enabled=true \
            --set security.secrets.audit.schedule="0 */6 * * *" \
            --set security.secrets.validation.enabled=true \
            --set security.monitoring.enabled=true \
            --set security.compliance.enabled=true \
            --set security.incidentResponse.enabled=true \
            --set security.certificateMonitoring.enabled=true \
            --set security.certificateMonitoring.schedule="0 */6 * * *" \
            --set security.waf.enabled=false \
            --set security.podSecurityPolicy.enabled=false \
            --set security.rbac.create=true \
            --set persistence.enabled=true \
            --set persistence.storageClass=${{ secrets.STORAGE_CLASS_STAGING }} \
            --set persistence.size=20Gi \
            --set postgresql.primary.persistence.size=20Gi \
            --set redis.master.persistence.size=10Gi \
            --set neo4j.persistence.dataSize=30Gi \
            --set neo4j.persistence.logsSize=10Gi \
            --set neo4j.persistence.importSize=20Gi \
            --set kafka.persistence.size=50Gi \
            --set zookeeper.persistence.dataSize=20Gi \
            --set zookeeper.persistence.logsSize=10Gi \
            --set snakemakeWorkflows.storage.workflowsSize=50Gi \
            --set snakemakeWorkflows.storage.outputsSize=100Gi \
            --set nextflowWorkflows.storage.workflowsSize=50Gi \
            --set nextflowWorkflows.storage.outputsSize=100Gi \
            --set argoWorkflows.config.artifactRepository.type=${{ secrets.ARTIFACT_REPOSITORY_TYPE }} \
            --set argoWorkflows.config.artifactRepository.s3.bucket=${{ secrets.ARTIFACT_REPOSITORY_BUCKET }} \
            --set argoWorkflows.config.artifactRepository.s3.region=${{ secrets.ARTIFACT_REPOSITORY_REGION }} \
            --set argoWorkflows.config.artifactRepository.s3.endpoint=${{ secrets.ARTIFACT_REPOSITORY_ENDPOINT }} \
            --set argoWorkflows.config.artifactRepository.s3.accessKeySecret.name=${{ secrets.ARTIFACT_REPOSITORY_ACCESS_KEY_SECRET }} \
            --set argoWorkflows.config.artifactRepository.s3.accessKeySecret.key=${{ secrets.ARTIFACT_REPOSITORY_ACCESS_KEY_KEY }} \
            --set argoWorkflows.config.artifactRepository.s3.secretKeySecret.name=${{ secrets.ARTIFACT_REPOSITORY_SECRET_KEY_SECRET }} \
            --set argoWorkflows.config.artifactRepository.s3.secretKeySecret.key=${{ secrets.ARTIFACT_REPOSITORY_SECRET_KEY_KEY }} \
            --set argoWorkflows.monitoring.enabled=true \
            --set argoWorkflows.monitoring.prometheus.enabled=true \
            --set argoWorkflows.monitoring.prometheus.serviceMonitor.enabled=true \
            --set argoWorkflows.monitoring.grafana.enabled=true \
            --set argoWorkflows.monitoring.grafana.dashboard.enabled=true \
            --set argoWorkflows.cronWorkflows.enabled=true \
            --set argoWorkflows.cronWorkflows.schedules[0].name="daily-blast-analysis" \
            --set argoWorkflows.cronWorkflows.schedules[0].schedule="0 2 * * *" \
