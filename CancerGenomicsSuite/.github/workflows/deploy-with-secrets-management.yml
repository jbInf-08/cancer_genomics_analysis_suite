            --set celery.beat.replicaCount=1 \
            --set postgresql.enabled=true \
            --set redis.enabled=true \
            --set neo4j.enabled=true \
            --set kafka.enabled=true \
            --set zookeeper.enabled=true \
            --set kafkaStreamProcessors.enabled=true \
            --set snakemakeWorkflows.enabled=true \
            --set nextflowWorkflows.enabled=true \
            --set argoWorkflows.enabled=true \
            --set backup.enabled=true \
            --set backup.schedule="0 2 * * *" \
            --set backup.retention="7d" \
            --set autoscaling.enabled=true \
