name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

  build-and-push:
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - registry: ghcr.io
            repository: ${{ github.repository }}
            use_ghcr: true
          - registry: docker.io
            repository: your-username/cancer-genomics-analysis-suite  # Change this
            use_ghcr: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ matrix.registry }}
        username: ${{ matrix.use_ghcr && github.actor || secrets.DOCKER_HUB_USERNAME }}
        password: ${{ matrix.use_ghcr && secrets.GITHUB_TOKEN || secrets.DOCKER_HUB_ACCESS_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ matrix.registry }}/${{ matrix.repository }}
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  generate-changelog:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      uses: TriPSs/conventional-changelog-action@v5
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        version-file: 'version.txt'
        skip-on-empty: false
        skip-bump: true
        skip-commit: true
        skip-tag: true
        skip-git-pull: true

    - name: Update release notes
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          
          github.rest.repos.updateRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            release_id: ${{ needs.create-release.outputs.release_id }},
            body: changelog
          });

  create-helm-chart:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Helm
      uses: azure/setup-helm@v3
      with:
        version: '3.12.0'

    - name: Package Helm chart
      run: |
        helm package helm/cancer-genomics-analysis-suite
        helm repo index . --url https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}

    - name: Upload Helm chart
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ needs.create-release.outputs.upload_url }}
        asset_path: ./cancer-genomics-analysis-suite-${{ github.ref_name }}.tgz
        asset_name: cancer-genomics-analysis-suite-${{ github.ref_name }}.tgz
        asset_content_type: application/gzip

  deploy-production:
    needs: [build-and-push, generate-changelog]
    runs-on: ubuntu-latest
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

    - name: Deploy to production
      run: |
        # Update image tag in kustomization
        sed -i "s/newTag: .*/newTag: ${{ github.ref_name }}/" k8s/kustomization.yaml
        
        # Deploy to production namespace
        kubectl apply -k k8s/ -n cancer-genomics
        
        # Wait for rollout
        kubectl rollout status deployment/cancer-genomics-web -n cancer-genomics --timeout=600s

    - name: Run post-deployment tests
      run: |
        # Wait for service to be ready
        kubectl wait --for=condition=ready pod -l app=cancer-genomics-web -n cancer-genomics --timeout=600s
        
        # Get service URL
        SERVICE_URL=$(kubectl get service nginx-service -n cancer-genomics -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        
        # Run comprehensive health checks
        curl -f http://$SERVICE_URL/health || exit 1
        curl -f http://$SERVICE_URL/api/status || exit 1

    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
      with:
        status: success
        channel: '#releases'
        fields: repo,message,commit,author,action,eventName,ref,workflow
        text: |
          🚀 Production deployment successful!
          Version: ${{ github.ref_name }}
          Repository: ${{ github.repository }}
