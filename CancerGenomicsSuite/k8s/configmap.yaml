apiVersion: v1
kind: ConfigMap
metadata:
  name: cancer-genomics-config
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
data:
  # Application Configuration
  FLASK_ENV: "production"
  APP_NAME: "Cancer Genomics Analysis Suite"
  APP_VERSION: "1.0.0"
  
  # Database Configuration
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "genomics_db"
  DATABASE_USER: "postgres"
  
  # Redis Configuration
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Celery Configuration
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"
  
  # Security Configuration
  SECRET_KEY: "your-production-secret-key-change-this"
  JWT_SECRET_KEY: "your-jwt-secret-key-change-this"
  
  # Logging Configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  
  # Feature Flags
  ENABLE_AUTH: "true"
  ENABLE_API: "true"
  ENABLE_DASHBOARD: "true"
  ENABLE_REPORTING: "true"
  
  # External Services
  ENSEMBL_API_URL: "https://rest.ensembl.org"
  UNIPROT_API_URL: "https://www.uniprot.org/uniprot"
  CLINVAR_API_URL: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils"
  
  # File Storage
  UPLOAD_FOLDER: "/app/uploads"
  MAX_CONTENT_LENGTH: "16777216"  # 16MB
  
  # Monitoring
  ENABLE_METRICS: "true"
  METRICS_PORT: "8080"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
data:
  nginx.conf: |
    upstream flask_app {
        server cancer-genomics-web:8050;
    }
    
    server {
        listen 80;
        server_name _;
        
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        
        # Rate limiting
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
        
        # Main application
        location / {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Health check endpoint
        location /health {
            proxy_pass http://flask_app;
            access_log off;
        }
        
        # Static files
        location /static/ {
            proxy_pass http://flask_app;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # API endpoints with stricter rate limiting
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Authentication endpoints
        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://flask_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Metrics endpoint
        location /metrics {
            proxy_pass http://flask_app:8080;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
        }
    }
