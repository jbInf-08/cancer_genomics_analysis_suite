apiVersion: apps/v1
kind: Deployment
metadata:
  name: cancer-genomics-celery
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cancer-genomics-celery
      component: worker
  template:
    metadata:
      labels:
        app: cancer-genomics-celery
        component: worker
    spec:
      containers:
      - name: celery-worker
        image: cancer-genomics:latest  # Will be updated by CI/CD
        command: ["celery", "-A", "celery_worker.celery", "worker", "--loglevel=info", "--concurrency=2"]
        env:
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: FLASK_ENV
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_NAME
        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cancer-genomics-secrets
              key: DATABASE_PASSWORD
        - name: CELERY_BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: CELERY_BROKER_URL
        - name: CELERY_RESULT_BACKEND
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: CELERY_RESULT_BACKEND
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cancer-genomics-secrets
              key: SECRET_KEY
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      initContainers:
      - name: wait-for-db
        image: postgres:15-alpine
        command: ['sh', '-c', 'until pg_isready -h postgres-service -p 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-redis
        image: redis:7-alpine
        command: ['sh', '-c', 'until redis-cli -h redis-service -p 6379 ping; do echo waiting for redis; sleep 2; done;']
---
apiVersion: apps/v1
