---
# AWS Secrets Manager CSI Driver
apiVersion: v1
kind: Namespace
metadata:
  name: aws-secrets-manager
  labels:
    name: aws-secrets-manager
---
# AWS Secrets Manager CSI Driver Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-secrets-manager-csi-driver
  namespace: aws-secrets-manager
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/cancer-genomics-secrets-manager-role
---
# AWS Secrets Manager CSI Driver ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-secrets-manager-csi-driver
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# AWS Secrets Manager CSI Driver ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aws-secrets-manager-csi-driver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aws-secrets-manager-csi-driver
subjects:
- kind: ServiceAccount
  name: aws-secrets-manager-csi-driver
  namespace: aws-secrets-manager
---
# AWS Secrets Manager CSI Driver Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-secrets-manager-csi-driver
  namespace: aws-secrets-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aws-secrets-manager-csi-driver
  template:
    metadata:
      labels:
        app: aws-secrets-manager-csi-driver
    spec:
      serviceAccountName: aws-secrets-manager-csi-driver
      containers:
      - name: aws-secrets-manager-csi-driver
        image: public.ecr.aws/aws-secrets-manager/secrets-store-csi-driver-provider-aws:1.0.r2-1-gd4b2d0b-ubuntu-20.04
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: AWS_REGION
          value: "us-west-2"
        - name: AWS_STS_REGIONAL_ENDPOINTS
          value: "regional"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/aws.secretsmanager.csi.k8s.io
        - name: mountpoint-dir
          mountPath: /var/lib/kubelet/pods
        - name: providersocket-dir
          mountPath: /tmp
        ports:
        - name: healthz
          containerPort: 9808
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      volumes:
      - name: socket-dir
        hostPath:
          path: /var/lib/kubelet/plugins/aws.secretsmanager.csi.k8s.io
          type: DirectoryOrCreate
      - name: mountpoint-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: DirectoryOrCreate
      - name: providersocket-dir
        emptyDir: {}
      nodeSelector:
        kubernetes.io/os: linux
---
# AWS Secrets Manager CSI Driver DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: aws-secrets-manager-csi-driver-node
  namespace: aws-secrets-manager
spec:
  selector:
    matchLabels:
      app: aws-secrets-manager-csi-driver-node
  template:
    metadata:
      labels:
        app: aws-secrets-manager-csi-driver-node
    spec:
      serviceAccountName: aws-secrets-manager-csi-driver
      containers:
      - name: aws-secrets-manager-csi-driver
        image: public.ecr.aws/aws-secrets-manager/secrets-store-csi-driver-provider-aws:1.0.r2-1-gd4b2d0b-ubuntu-20.04
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: AWS_REGION
          value: "us-west-2"
        - name: AWS_STS_REGIONAL_ENDPOINTS
          value: "regional"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/aws.secretsmanager.csi.k8s.io
        - name: mountpoint-dir
          mountPath: /var/lib/kubelet/pods
        - name: providersocket-dir
          mountPath: /tmp
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
          mountPropagation: Bidirectional
        ports:
        - name: healthz
          containerPort: 9808
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      volumes:
      - name: socket-dir
        hostPath:
          path: /var/lib/kubelet/plugins/aws.secretsmanager.csi.k8s.io
          type: DirectoryOrCreate
      - name: mountpoint-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: DirectoryOrCreate
      - name: providersocket-dir
        emptyDir: {}
      - name: kubelet-dir
        hostPath:
          path: /var/lib/kubelet
          type: Directory
      nodeSelector:
        kubernetes.io/os: linux
---
# SecretProviderClass for AWS Secrets Manager
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: aws-secrets-manager-spc
  namespace: cancer-genomics
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "cancer-genomics/database/password"
        objectType: "secretsmanager"
        objectVersion: "AWSCURRENT"
        objectAlias: "postgres-password"
      - objectName: "cancer-genomics/redis/password"
        objectType: "secretsmanager"
        objectVersion: "AWSCURRENT"
        objectAlias: "redis-password"
      - objectName: "cancer-genomics/app/secret-key"
        objectType: "secretsmanager"
        objectVersion: "AWSCURRENT"
        objectAlias: "secret-key"
      - objectName: "cancer-genomics/app/jwt-secret"
        objectType: "secretsmanager"
        objectVersion: "AWSCURRENT"
        objectAlias: "jwt-secret"
  secretObjects:
  - secretName: aws-secrets
    type: Opaque
    data:
    - objectName: "postgres-password"
      key: "POSTGRES_PASSWORD"
    - objectName: "redis-password"
      key: "REDIS_PASSWORD"
    - objectName: "secret-key"
      key: "SECRET_KEY"
    - objectName: "jwt-secret"
      key: "JWT_SECRET"
---
# Example Pod using AWS Secrets Manager
apiVersion: v1
kind: Pod
metadata:
  name: cancer-genomics-app-with-aws-secrets
  namespace: cancer-genomics
spec:
  serviceAccountName: aws-secrets-manager-csi-driver
  containers:
  - name: cancer-genomics-app
    image: cancer-genomics-analysis-suite:latest
    volumeMounts:
    - name: secrets-store-inline
      mountPath: "/mnt/secrets-store"
      readOnly: true
    env:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: aws-secrets
          key: POSTGRES_PASSWORD
    - name: REDIS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: aws-secrets
          key: REDIS_PASSWORD
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: aws-secrets
          key: SECRET_KEY
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: aws-secrets
          key: JWT_SECRET
  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "aws-secrets-manager-spc"
