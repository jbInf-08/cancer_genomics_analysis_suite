---
# Cert-manager namespace
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
  labels:
    name: cert-manager
---
# Cert-manager CRDs
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: certificaterequests.cert-manager.io
spec:
  group: cert-manager.io
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              duration:
                type: string
              issuerRef:
                type: object
                properties:
                  group:
                    type: string
                  kind:
                    type: string
                  name:
                    type: string
              request:
                type: string
                format: byte
              usages:
                type: array
                items:
                  type: string
                  enum:
                  - signing
                  - digital signature
                  - content commitment
                  - key encipherment
                  - key agreement
                  - data encipherment
                  - key encipherment
                  - certificate sign
                  - crl sign
                  - encipher only
                  - decipher only
                  - any
                  - server auth
                  - client auth
                  - code signing
                  - email protection
                  - s/mime
                  - ipsec end system
                  - ipsec tunnel
                  - ipsec user
                  - timestamping
                  - ocsp signing
                  - microsoft sgc
                  - netscape sgc
          status:
            type: object
            properties:
              conditions:
                type: array
                items:
                  type: object
                  properties:
                    lastTransitionTime:
                      type: string
                      format: date-time
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                    type:
                      type: string
              failureTime:
                type: string
                format: date-time
              ready:
                type: boolean
---
# Let's Encrypt ClusterIssuer for production
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com  # Change to your email
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
---
# Let's Encrypt ClusterIssuer for staging
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com  # Change to your email
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
    - http01:
        ingress:
          class: nginx
---
# AWS Certificate Manager ClusterIssuer (if using AWS)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: aws-cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com  # Change to your email
    privateKeySecretRef:
      name: aws-cert-manager
    solvers:
    - dns01:
        route53:
          region: us-west-2  # Change to your AWS region
          accessKeyID: ${AWS_ACCESS_KEY_ID}
          secretAccessKeySecretRef:
            name: aws-secrets
            key: secret-access-key
---
# GCP Certificate Manager ClusterIssuer (if using GCP)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: gcp-cert-manager
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@yourdomain.com  # Change to your email
    privateKeySecretRef:
      name: gcp-cert-manager
    solvers:
    - dns01:
        cloudDNS:
          project: your-gcp-project  # Change to your GCP project
          serviceAccountSecretRef:
            name: gcp-secrets
            key: service-account.json
