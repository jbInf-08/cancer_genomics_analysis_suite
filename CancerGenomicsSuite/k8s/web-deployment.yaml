apiVersion: apps/v1
kind: Deployment
metadata:
  name: cancer-genomics-web
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cancer-genomics-web
      component: web
  template:
    metadata:
      labels:
        app: cancer-genomics-web
        component: web
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: web
        image: cancer-genomics:latest  # Will be updated by CI/CD
        ports:
        - containerPort: 8050
          name: http
        - containerPort: 8080
          name: metrics
        env:
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: FLASK_ENV
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_HOST
        - name: DATABASE_PORT
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_PORT
        - name: DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_NAME
        - name: DATABASE_USER
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cancer-genomics-secrets
              key: DATABASE_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: REDIS_PORT
        - name: CELERY_BROKER_URL
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: CELERY_BROKER_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cancer-genomics-secrets
              key: SECRET_KEY
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: cancer-genomics-secrets
              key: JWT_SECRET_KEY
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: cancer-genomics-config
              key: LOG_LEVEL
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8050
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8050
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: uploads
          mountPath: /app/uploads
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: uploads
        emptyDir: {}
      - name: logs
        emptyDir: {}
      initContainers:
      - name: wait-for-db
        image: postgres:15-alpine
        command: ['sh', '-c', 'until pg_isready -h postgres-service -p 5432; do echo waiting for postgres; sleep 2; done;']
      - name: wait-for-redis
        image: redis:7-alpine
        command: ['sh', '-c', 'until redis-cli -h redis-service -p 6379 ping; do echo waiting for redis; sleep 2; done;']
---
apiVersion: v1
kind: Service
metadata:
  name: cancer-genomics-web
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: web
spec:
  selector:
    app: cancer-genomics-web
    component: web
  ports:
  - port: 8050
    targetPort: 8050
    protocol: TCP
    name: http
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: metrics
  type: ClusterIP
