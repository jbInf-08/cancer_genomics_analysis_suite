apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
      component: nginx
  template:
    metadata:
      labels:
        app: nginx
        component: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.25-alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: nginx
spec:
  selector:
    app: nginx
    component: nginx
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
  type: LoadBalancer  # Change to ClusterIP if using Ingress
