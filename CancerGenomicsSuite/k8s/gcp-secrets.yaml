---
# GCP Secret Manager CSI Driver
apiVersion: v1
kind: Namespace
metadata:
  name: gcp-secret-manager
  labels:
    name: gcp-secret-manager
---
# GCP Secret Manager CSI Driver Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gcp-secret-manager-csi-driver
  namespace: gcp-secret-manager
  annotations:
    iam.gke.io/gcp-service-account: cancer-genomics-secret-manager@PROJECT_ID.iam.gserviceaccount.com
---
# GCP Secret Manager CSI Driver ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gcp-secret-manager-csi-driver
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
# GCP Secret Manager CSI Driver ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gcp-secret-manager-csi-driver
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gcp-secret-manager-csi-driver
subjects:
- kind: ServiceAccount
  name: gcp-secret-manager-csi-driver
  namespace: gcp-secret-manager
---
# GCP Secret Manager CSI Driver Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gcp-secret-manager-csi-driver
  namespace: gcp-secret-manager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gcp-secret-manager-csi-driver
  template:
    metadata:
      labels:
        app: gcp-secret-manager-csi-driver
    spec:
      serviceAccountName: gcp-secret-manager-csi-driver
      containers:
      - name: gcp-secret-manager-csi-driver
        image: gcr.io/gke-release/gcp-compute-persistent-disk-csi-driver:v1.9.0-gke.0
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: GCP_PROJECT_ID
          value: "PROJECT_ID"
        - name: GCP_REGION
          value: "us-central1"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/gcp.secretsmanager.csi.k8s.io
        - name: mountpoint-dir
          mountPath: /var/lib/kubelet/pods
        - name: providersocket-dir
          mountPath: /tmp
        ports:
        - name: healthz
          containerPort: 9808
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      volumes:
      - name: socket-dir
        hostPath:
          path: /var/lib/kubelet/plugins/gcp.secretsmanager.csi.k8s.io
          type: DirectoryOrCreate
      - name: mountpoint-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: DirectoryOrCreate
      - name: providersocket-dir
        emptyDir: {}
      nodeSelector:
        kubernetes.io/os: linux
---
# GCP Secret Manager CSI Driver DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gcp-secret-manager-csi-driver-node
  namespace: gcp-secret-manager
spec:
  selector:
    matchLabels:
      app: gcp-secret-manager-csi-driver-node
  template:
    metadata:
      labels:
        app: gcp-secret-manager-csi-driver-node
    spec:
      serviceAccountName: gcp-secret-manager-csi-driver
      containers:
      - name: gcp-secret-manager-csi-driver
        image: gcr.io/gke-release/gcp-compute-persistent-disk-csi-driver:v1.9.0-gke.0
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: GCP_PROJECT_ID
          value: "PROJECT_ID"
        - name: GCP_REGION
          value: "us-central1"
        volumeMounts:
        - name: socket-dir
          mountPath: /var/lib/kubelet/plugins/gcp.secretsmanager.csi.k8s.io
        - name: mountpoint-dir
          mountPath: /var/lib/kubelet/pods
        - name: providersocket-dir
          mountPath: /tmp
        - name: kubelet-dir
          mountPath: /var/lib/kubelet
          mountPropagation: Bidirectional
        ports:
        - name: healthz
          containerPort: 9808
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 30
          timeoutSeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /healthz
            port: healthz
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
          failureThreshold: 3
      volumes:
      - name: socket-dir
        hostPath:
          path: /var/lib/kubelet/plugins/gcp.secretsmanager.csi.k8s.io
          type: DirectoryOrCreate
      - name: mountpoint-dir
        hostPath:
          path: /var/lib/kubelet/pods
          type: DirectoryOrCreate
      - name: providersocket-dir
        emptyDir: {}
      - name: kubelet-dir
        hostPath:
          path: /var/lib/kubelet
          type: Directory
      nodeSelector:
        kubernetes.io/os: linux
---
# SecretProviderClass for GCP Secret Manager
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: gcp-secret-manager-spc
  namespace: cancer-genomics
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/PROJECT_ID/secrets/cancer-genomics-database-password/versions/latest"
        path: "postgres-password"
      - resourceName: "projects/PROJECT_ID/secrets/cancer-genomics-redis-password/versions/latest"
        path: "redis-password"
      - resourceName: "projects/PROJECT_ID/secrets/cancer-genomics-app-secret-key/versions/latest"
        path: "secret-key"
      - resourceName: "projects/PROJECT_ID/secrets/cancer-genomics-app-jwt-secret/versions/latest"
        path: "jwt-secret"
  secretObjects:
  - secretName: gcp-secrets
    type: Opaque
    data:
    - objectName: "postgres-password"
      key: "POSTGRES_PASSWORD"
    - objectName: "redis-password"
      key: "REDIS_PASSWORD"
    - objectName: "secret-key"
      key: "SECRET_KEY"
    - objectName: "jwt-secret"
      key: "JWT_SECRET"
---
# Example Pod using GCP Secret Manager
apiVersion: v1
kind: Pod
metadata:
  name: cancer-genomics-app-with-gcp-secrets
  namespace: cancer-genomics
spec:
  serviceAccountName: gcp-secret-manager-csi-driver
  containers:
  - name: cancer-genomics-app
    image: cancer-genomics-analysis-suite:latest
    volumeMounts:
    - name: secrets-store-inline
      mountPath: "/mnt/secrets-store"
      readOnly: true
    env:
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: gcp-secrets
          key: POSTGRES_PASSWORD
    - name: REDIS_PASSWORD
      valueFrom:
        secretKeyRef:
          name: gcp-secrets
          key: REDIS_PASSWORD
    - name: SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: gcp-secrets
          key: SECRET_KEY
    - name: JWT_SECRET
      valueFrom:
        secretKeyRef:
          name: gcp-secrets
          key: JWT_SECRET
  volumes:
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "gcp-secret-manager-spc"
