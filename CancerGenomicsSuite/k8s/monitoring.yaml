apiVersion: v1
kind: ServiceMonitor
metadata:
  name: cancer-genomics-monitor
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    release: prometheus  # Adjust based on your Prometheus setup
spec:
  selector:
    matchLabels:
      app: cancer-genomics-web
      component: web
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
apiVersion: v1
kind: Service
metadata:
  name: cancer-genomics-metrics
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: metrics
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: cancer-genomics-web
    component: web
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: metrics
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: monitoring
data:
  cancer-genomics-rules.yml: |
    groups:
    - name: cancer-genomics
      rules:
      - alert: CancerGenomicsDown
        expr: up{job="cancer-genomics-web"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Cancer Genomics service is down"
          description: "Cancer Genomics web service has been down for more than 1 minute."
      
      - alert: CancerGenomicsHighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second."
      
      - alert: CancerGenomicsHighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High response time detected"
          description: "95th percentile response time is {{ $value }} seconds."
      
      - alert: CancerGenomicsDatabaseConnection
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Database connection lost"
          description: "PostgreSQL database is not accessible."
      
      - alert: CancerGenomicsRedisConnection
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Redis connection lost"
          description: "Redis cache is not accessible."
      
      - alert: CancerGenomicsHighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 80% for {{ $labels.pod }}."
      
      - alert: CancerGenomicsHighCPUUsage
        expr: (rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * container_spec_cpu_period) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for {{ $labels.pod }}."
