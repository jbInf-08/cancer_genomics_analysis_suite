apiVersion: v1
kind: Namespace
metadata:
  name: cancer-genomics
  labels:
    name: cancer-genomics
    app: cancer-genomics-analysis-suite
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: cancer-genomics-quota
  namespace: cancer-genomics
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    pods: "20"
    services: "10"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: cancer-genomics-limits
  namespace: cancer-genomics
spec:
  limits:
  - default:
      cpu: "1"
      memory: "2Gi"
    defaultRequest:
      cpu: "100m"
      memory: "256Mi"
    type: Container
