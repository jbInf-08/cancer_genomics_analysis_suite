apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cancer-genomics-ingress
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
  annotations:
    # NGINX Ingress Controller annotations
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "16m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    
    # Rate limiting
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Cert-manager for SSL certificates
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # Monitoring
    prometheus.io/scrape: "true"
    prometheus.io/port: "10254"
    prometheus.io/path: "/metrics"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - cancer-genomics.yourdomain.com  # Change to your domain
    secretName: cancer-genomics-tls
  rules:
  - host: cancer-genomics.yourdomain.com  # Change to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80
---
# Alternative: Ingress for API-only access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cancer-genomics-api-ingress
  namespace: cancer-genomics
  labels:
    app: cancer-genomics-analysis-suite
    component: api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Access-Control-Allow-Origin "*" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
      add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.cancer-genomics.yourdomain.com  # Change to your API domain
    secretName: cancer-genomics-api-tls
  rules:
  - host: api.cancer-genomics.yourdomain.com  # Change to your API domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cancer-genomics-web
            port:
              number: 8050
