# Docker Compose for Cancer Genomics Database Services
# 
# Usage:
#   Start:  docker-compose -f docker/docker-compose.db.yml up -d
#   Stop:   docker-compose -f docker/docker-compose.db.yml down
#   Logs:   docker-compose -f docker/docker-compose.db.yml logs -f
#
# After starting, run: python scripts/setup_postgresql.py

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: cancer_genomics_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cancer_genomics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cancer_genomics_dev}
      POSTGRES_DB: ${POSTGRES_DB:-cancer_genomics}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cancer_genomics_net

  # pgAdmin (Optional - Web interface for PostgreSQL)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cancer_genomics_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@cancer-genomics.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cancer_genomics_net

  # Redis (for caching and Celery)
  redis:
    image: redis:7-alpine
    container_name: cancer_genomics_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cancer_genomics_net

  # Neo4j (for knowledge graph)
  neo4j:
    image: neo4j:5-community
    container_name: cancer_genomics_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-cancer_genomics_dev}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: 'true'
      NEO4J_apoc_import_file_enabled: 'true'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-cancer_genomics_dev}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cancer_genomics_net
    profiles:
      - full  # Only start with --profile full

volumes:
  postgres_data:
    name: cancer_genomics_postgres_data
  pgadmin_data:
    name: cancer_genomics_pgadmin_data
  redis_data:
    name: cancer_genomics_redis_data
  neo4j_data:
    name: cancer_genomics_neo4j_data
  neo4j_logs:
    name: cancer_genomics_neo4j_logs

networks:
  cancer_genomics_net:
    name: cancer_genomics_network
    driver: bridge
